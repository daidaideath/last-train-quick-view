*{box-sizing:border-box}html,body{width:100%;margin:0;background:var(--void);color:var(--text);font-family:"Segoe UI","Yu Gothic UI",Meiryo,sans-serif}body{min-height:100vh;background:radial-gradient(circle at 80% 0,#102334 0,transparent 34%),linear-gradient(145deg,#020406,#060a10 70%);overflow-x:hidden}button,input{font:inherit}.app{min-height:100vh}.top{position:sticky;top:0;z-index:20;min-height:58px;padding:0 max(16px,env(safe-area-inset-left));display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:rgba(3,5,8,.94);backdrop-filter:blur(14px)}.brand{display:flex;align-items:baseline;gap:12px}.brand strong{letter-spacing:.16em;font-size:18px}.brand span{color:var(--muted);font-size:11px;letter-spacing:.18em}.current{font-size:12px;color:var(--cyan);letter-spacing:.08em}.view{width:min(920px,calc(100% - 32px));margin:0 auto}.station-view{padding:34px 0 52px}.eyebrow{margin:0 0 8px;color:var(--cyan);font-size:11px;letter-spacing:.16em}.station-view h1{margin:0;font-size:clamp(24px,5vw,38px);letter-spacing:.04em}.lead{margin:12px 0 24px;color:#aebdcc;line-height:1.75}.search{width:100%;min-height:48px;margin-bottom:16px;padding:0 15px;border:1px solid var(--line);border-radius:8px;background:#080d14;color:#fff;outline:none}.search:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(89,220,255,.12)}.stations{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.station{min-height:54px;padding:0 16px;border:1px solid var(--line);border-radius:8px;background:rgba(8,12,18,.9);color:#dce7f1;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between}.station::after{content:'›';color:var(--cyan);font-size:22px}.station:hover,.station:focus-visible{border-color:var(--cyan);background:#0c202c;outline:none}.empty{display:none;color:var(--muted);padding:20px 0}.detail-view{width:min(920px,100%);margin:0 auto}.detail-head{position:sticky;top:58px;z-index:15;min-height:58px;padding:8px 16px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;border-bottom:1px solid var(--line);background:rgba(5,9,14,.96);backdrop-filter:blur(14px)}.back{min-height:42px;padding:0 13px;border:1px solid #294157;border-radius:7px;background:#09121c;color:#dbe8f3;cursor:pointer}.back:hover,.back:focus-visible{border-color:var(--cyan);outline:none}.detail-head h1{margin:0;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.detail-count{color:var(--muted);font-size:11px;letter-spacing:.12em}.detail-body{padding:22px 16px 56px}.jump-box{margin-bottom:24px;padding:18px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(145deg,rgba(13,19,28,.98),rgba(6,10,15,.98))}.jump-box h2{margin:0 0 6px;font-size:16px}.jump-box p{margin:0 0 14px;color:var(--muted);font-size:13px}.sections{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.section{min-height:48px;padding:10px 12px;border:1px solid var(--line);border-radius:7px;background:#080d14;color:#c9d8e5;text-decoration:none;display:flex;align-items:center}.section:hover,.section:focus-visible{border-color:var(--cyan);color:#fff;outline:none}.content{display:grid;gap:16px}.chapter{scroll-margin-top:130px;padding:20px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(150deg,rgba(13,19,28,.98),rgba(6,10,15,.98));box-shadow:0 16px 42px rgba(0,0,0,.2)}.chapter-title{margin:0 0 18px;padding-bottom:12px;border-bottom:1px solid var(--line);font-size:20px;color:#fff}.page-inner{color:#dce7f1;font-size:15px;line-height:1.72}.page-part+.page-part{margin-top:16px}.page-inner h3{margin:20px 0 10px;color:#fff;font-size:17px;border-left:3px solid var(--cyan);padding-left:10px}.page-inner h4{margin:18px 0 8px;color:#c9d8e5}.page-inner p{margin:0 0 12px}.page-inner ul{margin:0 0 12px;padding-left:22px;display:grid;gap:7px}.page-inner strong{color:#fff}.page-inner code{color:var(--lime);font-family:inherit}.day{font-weight:800}.weekday{color:var(--cyan)}.holiday{color:var(--amber)}.mixed{color:inherit}.table-wrap{width:100%;margin:10px 0 14px;border:1px solid var(--line)}table{width:100%;table-layout:fixed;border-collapse:collapse;font-size:13px}th,td{padding:9px 10px;border-bottom:1px solid #17222e;text-align:left;vertical-align:top;overflow-wrap:anywhere;word-break:break-word}th{color:#a9bed0;background:#0b1119;font-weight:650}tr:last-child td{border-bottom:0}a{color:#8ccfff;text-decoration:none;overflow-wrap:anywhere}.chapter-tools{display:flex;justify-content:flex-end;margin-top:18px}.to-top{color:#8ccfff;text-decoration:none;font-size:13px}.detail-foot{padding:8px 16px 44px}.back-wide{width:100%;min-height:50px}.foot{min-height:42px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;color:#60758a;font-size:10px;letter-spacing:.1em;border-top:1px solid var(--line)}.legend{display:flex;gap:14px}.legend .weekday,.legend .holiday{font-size:11px}[hidden]{display:none!important}

<main><section class="view station-view" id="stationView"><p class="eyebrow">LAST TRAIN QUICK VIEW</p><h1>調べたい駅を選択</h1><p class="lead">駅を選んだあと、知りたい情報をタップしてください。各駅の情報は1本の縦長ページで確認できます。</p><label><span class="eyebrow">駅名で絞り込み</span><input class="search" id="stationSearch" type="search" placeholder="例：東京、品川、蒲田" autocomplete="off"></label><nav class="stations" id="stations" aria-label="駅を選択"></nav><p class="empty" id="empty">該当する駅がありません。</p></section><section class="detail-view" id="detailView" hidden><header class="detail-head"><button class="back" id="backToStations" type="button">← 駅一覧</button><h1 id="stationTitle"></h1><span class="detail-count" id="current"></span></header><div class="detail-body"><section class="jump-box"><h2>知りたい情報へ</h2><p>タップすると該当箇所へ移動します。そのまま上下にスクロールできます。</p><nav class="sections" id="sections" aria-label="章を選択"></nav></section><div class="content" id="content"></div></div><div class="detail-foot"><button class="back back-wide" id="backToStationsBottom" type="button">← 駅一覧へ戻る</button></div></section></main>

</div><script>
const stations=[{"name": "経堂駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>経堂駅には小田急小田原線が乗り入れている。公式駅ページでは、急行、準急、通勤準急、各駅停車の停車駅とされている。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>上り<\/td><td>新宿、代々木上原、東京メトロ千代田線方面<\/td><td>豪徳寺駅<\/td><\/tr><tr><td>下り<\/td><td>成城学園前、登戸、新百合ヶ丘、町田、小田原、唐木田方面<\/td><td>千歳船橋駅<\/td><\/tr><\/tbody><\/table><\/div><p>駅にはバス停、タクシー乗り場があり、終電後の移動手段を観察しやすい。<\/p>"]}, {"name": "駅を出る最終列車", "pages": ["<p><span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも、公式時刻表上の最終出発時刻は同じ。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>最終出発<\/th><th>行き先<\/th><th>種別<\/th><\/tr><\/thead><tbody><tr><td>上り<\/td><td>0:31<\/td><td>新宿<\/td><td>各駅停車<\/td><\/tr><tr><td>下り<\/td><td>0:44<\/td><td>向ヶ丘遊園<\/td><td>各駅停車<\/td><\/tr><tr><td>下り<\/td><td>0:44<\/td><td>成城学園前<\/td><td>急行<\/td><\/tr><\/tbody><\/table><\/div><h3>終電を逃す可能性が高まる時間<\/h3>", "<ul><li>新宿方面は0:31発以降、営業列車がない。<\/li><li>成城学園前・向ヶ丘遊園方面は0:44発以降、営業列車がない。<\/li><li>0:54と1:00に到着する経堂止まりの利用客は、経堂駅から先へ小田急線で移動できない。<\/li><\/ul>"]}, {"name": "駅に着く最終列車", "pages": ["<p>深夜の経堂止まりは、千歳船橋側と豪徳寺側の両方向から設定されている。<\/p><p><span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも時刻は同じ。到着時刻は、小田急電鉄公式時刻表の列車別停車駅表示で確認した。<\/p><div class=\"table-wrap\"><table><thead><tr><th>到着方向<\/th><th>隣駅発<\/th><th>経堂到着<\/th><th>種別<\/th><\/tr><\/thead><tbody><tr><td>千歳船橋側（小田原側）<\/td><td>千歳船橋 0:53発<\/td><td>0:54<\/td><td>各駅停車・経堂行<\/td><\/tr><tr><td>豪徳寺側（新宿側）<\/td><td>豪徳寺 0:58発<\/td><td>1:00<\/td><td>各駅停車・経堂行<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "見るべきポイント", "pages": ["<h3><span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>共通<\/h3><ul><li>調査推奨時間：0:15～1:10ごろ<\/li><li>特に注目する時間：0:30～1:05ごろ<\/li><li>最後の経堂止まり到着：1:00<\/li><li>降車後の移動や待ち合わせを考慮すると、1:05～1:10ごろまで駅から人が出てくる可能性がある。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>経堂駅で終電を逃した利用客や、経堂止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、最終列車と当駅止まり列車を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>0:54および1:00の経堂止まり到着後、改札から出てくる人数<\/li><li>千歳船橋側と豪徳寺側から来る利用客数の違い<\/li><li>タクシー乗り場へ向かう人数と待機列<\/li><li>バス、送迎車、徒歩、自転車などへの移動<\/li><li>駅前で待機する人、電話をする人、経路を検索する人<\/li><li>経堂コルティ側と反対側への人の流れ<\/li><\/ul><ul><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：小田急小田原線 経堂駅（OH11）<\/li><li>時刻表：小田急電鉄公式サイトで2026年6月11日に表示された時刻表<\/li><\/ul><ul><li>本資料は2026年6月11日に閲覧した小田急電鉄公式情報を基にしている。<\/li><li>上りPDF時刻表には「2026年3月16日改正」と表示されている。<\/li><li>小田急公式の動的時刻表には「2026年6月11日現在」と表示されている。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に小田急電鉄公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>小田急電鉄「経堂駅のご案内」<\/li><\/ul><p><a href=\"https://www.odakyu.jp/station/kyodo/\" target=\"_blank\" rel=\"noreferrer\">https://www.odakyu.jp/station/kyodo/<\/a><\/p><ul><li>小田急電鉄「経堂駅 時刻表詳細（上り）」<\/li><\/ul><p><a href=\"https://www.odakyu.jp/station/kyodo/timetable/up/\" target=\"_blank\" rel=\"noreferrer\">https://www.odakyu.jp/station/kyodo/timetable/up/<\/a><\/p><ul><li>小田急電鉄「経堂駅 時刻表詳細（下り）」<\/li><\/ul>", "<p><a href=\"https://www.odakyu.jp/station/kyodo/timetable/down/\" target=\"_blank\" rel=\"noreferrer\">https://www.odakyu.jp/station/kyodo/timetable/down/<\/a><\/p><ul><li>小田急電鉄「豪徳寺駅 時刻表詳細（下り）」<\/li><\/ul><p><a href=\"https://www.odakyu.jp/station/gotokuji/timetable/down/\" target=\"_blank\" rel=\"noreferrer\">https://www.odakyu.jp/station/gotokuji/timetable/down/<\/a><\/p><ul><li>小田急電鉄「千歳船橋駅 時刻表詳細（上り）」<\/li><\/ul><p><a href=\"https://www.odakyu.jp/station/chitose_funabashi/timetable/up/\" target=\"_blank\" rel=\"noreferrer\">https://www.odakyu.jp/station/chitose_funabashi/timetable/up/<\/a><\/p>"]}]}, {"name": "桜上水駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>桜上水駅には京王線が乗り入れている。公式駅ページでは、急行、区間急行、快速、各駅停車の停車駅とされている。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>上り<\/td><td>明大前、笹塚、新宿、新線新宿、都営新宿線方面<\/td><td>下高井戸駅<\/td><\/tr><tr><td>下り<\/td><td>調布、橋本、京王八王子、高尾山口方面<\/td><td>上北沢駅<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<p><span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも、公式時刻表上の最終出発時刻は同じ。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>最終出発<\/th><th>行き先<\/th><th>種別<\/th><\/tr><\/thead><tbody><tr><td>上り<\/td><td>0:16<\/td><td>新線新宿<\/td><td>各駅停車<\/td><\/tr><tr><td>下り<\/td><td>0:31<\/td><td>若葉台<\/td><td>各駅停車<\/td><\/tr><\/tbody><\/table><\/div><h3>終電を逃す可能性が高まる時間<\/h3>", "<ul><li>新宿方面は0:16発以降、営業列車がない。<\/li><li>京王八王子・橋本・高尾山口方面は0:31発以降、営業列車がない。<\/li><li>0:31以降に桜上水駅へ到着する当駅止まり列車の利用客は、桜上水から先へ電車で移動できない。<\/li><\/ul>"]}, {"name": "駅に着く最終列車", "pages": ["<p>桜上水止まりは、下高井戸側（新宿側）と上北沢側（八王子側）の両方向から設定されている。<\/p><p>到着時刻は、京王電鉄公式時刻表に掲載された隣駅の発車時刻に、通常の駅間所要時間約2分を加えた見込み時刻である。公式時刻表に桜上水の到着時刻そのものは掲載されていないため、現地では数分の余裕を持って確認する。<\/p><h3>下高井戸側から到着する列車<\/h3><p><span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>共通。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>始発駅・始発時刻<\/th><th>下高井戸発<\/th><th>桜上水到着見込み<\/th><\/tr><\/thead><tbody><tr><td>京王線新宿 0:14発<\/td><td>0:23<\/td><td>0:25ごろ<\/td><\/tr><tr><td>新線新宿 0:27発 \/td><td>国分寺、立川、高尾方面<\/td><td>武蔵境<\/td><\/tr><tr><td>中央・総武線各駅停車・東行<\/td><td>吉祥寺、中野、新宿、千葉方面<\/td><td>吉祥寺<\/td><\/tr><tr><td>東西線直通・東行<\/td><td>中野、大手町、西船橋方面<\/td><td>吉祥寺<\/td><\/tr><\/tbody><\/table><\/div><p>中央・総武線各駅停車は三鷹が西端の始発・終着駅であり、武蔵境方面へは中央線快速を利用する。<\/p>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span><\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>三鷹駅発<\/th><th>行き先<\/th><\/tr><\/thead><tbody><tr><td>中央線快速・上り（新宿・東京方面）<\/td><td>23:55<\/td><td>東京<\/td><\/tr><tr><td>中央線快速・下り（立川方面）<\/td><td>0:40<\/td><td>武蔵小金井<\/td><\/tr><tr><td>中央・総武線各駅停車・東行<\/td><td>0:34<\/td><td>中野<\/td><\/tr><\/tbody><\/table><\/div><h3><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>三鷹駅発<\/th><th>行き先<\/th><\/tr><\/thead><tbody><tr><td>中央線快速・上り（新宿・東京方面）<\/td><td>23:57<\/td><td>東京<\/td><\/tr><tr><td>中央線快速・下り（立川方面）<\/td><td>0:39<\/td><td>武蔵小金井<\/td><\/tr><tr><td>中央・総武線各駅停車・東行<\/td><td>0:34<\/td><td>中野<\/td><\/tr><\/tbody><\/table><\/div><p>東京メトロ東西線直通列車も中央・総武線の線路を使用するが、深夜の最終列車は中野行であり、東西線内へは直通しない。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>吉祥寺駅の中央・総武線各駅停車西行時刻表から、深夜の三鷹行を抽出した。吉祥寺から三鷹までは通常約2分として到着時刻を見込んだ。<\/p><h3><span class=\"day weekday\">平日<\/span><\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>吉祥寺発<\/th><th>三鷹到着見込み<\/th><\/tr><\/thead><tbody><tr><td>0:12<\/td><td>0:14ごろ<\/td><\/tr><tr><td>0:19<\/td><td>0:21ごろ<\/td><\/tr><tr><td>0:26<\/td><td>0:28ごろ<\/td><\/tr><tr><td>0:34<\/td><td>0:36ごろ<\/td><\/tr><tr><td>0:49<\/td><td>0:51ごろ<\/td><\/tr><tr><td>0:55<\/td><td>0:57ごろ<\/td><\/tr><\/tbody><\/table><\/div>", "<h3><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>吉祥寺発<\/th><th>三鷹到着見込み<\/th><\/tr><\/thead><tbody><tr><td>0:06<\/td><td>0:08ごろ<\/td><\/tr><tr><td>0:16<\/td><td>0:18ごろ<\/td><\/tr><tr><td>0:26<\/td><td>0:28ごろ<\/td><\/tr><tr><td>0:38<\/td><td>0:40ごろ<\/td><\/tr><tr><td>0:49<\/td><td>0:51ごろ<\/td><\/tr><tr><td>0:55<\/td><td>0:57ごろ<\/td><\/tr><\/tbody><\/table><\/div>", "<p>中央線快速では、確認した深夜時間帯に吉祥寺発の三鷹行はない。まとまった降車は中央・総武線各駅停車の三鷹行が中心となる。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：0:10～1:05ごろ<\/li><li>特に注目する時間：0:25～1:00ごろ<\/li><li>最後の三鷹止まり到着見込み：0:57ごろ<\/li><\/ul><p>三鷹発の最終は中央・総武線0:34中野行、中央線快速下りが<span class=\"day weekday\">平日<\/span>0:40・<span class=\"day holiday\">土<span class=\"day holiday\">休日<\/span><\/span>0:39武蔵小金井行である。一方、吉祥寺から三鷹行が0:55まで出発するため、三鷹止まりの最後の到着は0:57ごろとなる。<\/p><h3>現地で確認したいこと<\/h3>", "<p>三鷹駅で終電を逃した利用客と、三鷹止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、中央線快速、中央・総武線各駅停車の最終列車と深夜の三鷹行を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>北口・南口での人流の違い<\/li><li>0:36、0:51、0:57ごろの三鷹止まり降車人数<\/li><li>中央線快速下り最終後に立川方面を目指す利用客の行動<\/li><li>バス乗り場、タクシー乗り場、自転車置き場への移動<\/li><li>吉祥寺方面から来た三鷹止まり利用客が駅外へ出るまでの時間<\/li><li><span class=\"day weekday\">平日<\/span>と<span class=\"day holiday\">土<span class=\"day holiday\">休日<\/span><\/span>の0時台到着間隔の違い<\/li><\/ul><ul><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本 三鷹駅<\/li><li>時刻表：JR東日本公式サイトで確認<\/li><\/ul><ul><li>本資料は2026年6月12日に閲覧したJR東日本公式時刻表を基にしている。<\/li><li>表示は「JR時刻表」2026年6月号に基づく。<\/li><li>三鷹到着時刻は吉祥寺駅の公式発車時刻から算出した見込みである。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「三鷹駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list1463.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list1463.html<\/a><\/p><ul><li>JR東日本「吉祥寺駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0596.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0596.html<\/a><\/p>"]}]}, {"name": "上野駅", "sections": [{"name": "駅・路線の概要", "pages": ["<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th>< は、大崎に到着して運転を終了する列車を確認できない。このため、外回りは品川駅、内回りは五反田駅の公式時刻表から「大崎行」を抽出した。<\/p><p>到着時刻は、隣駅の公式発車時刻に通常の駅間所要時間を加えた見込みである。品川駅から大崎駅は約3分、五反田駅から大崎駅は約2分としている。<\/p><h3><span class=\"day weekday\">平日<\/span>・外回り（品川側から）<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>品川発<\/th><th>大崎到着見込み<\/th><\/tr><\/thead><tbody><tr><td>0:26<\/td><td>0:29ごろ<\/td><\/tr><tr><td>0:33<\/td><td>0:36ごろ<\/td><\/tr><tr><td>0:37<\/td><td>0:40ごろ<\/td><\/tr><tr><td>0:42<\/td><td>0:45ごろ<\/td><\/tr><tr><td>0:47<\/td><td>0:50ごろ<\/td><\/tr><\/tbody><\/table><\/div><p>このほか、0:03および0:16品川発の大崎行がある。<\/p>", "<h3><span class=\"day weekday\">平日<\/span>・内回り（五反田側から）<\/h3><div class=\"table-wrap\"><table><thead><tr><th>五反田発<\/th><th>大崎到着見込み<\/th><\/tr><\/thead><tbody><tr><td>0:28<\/td><td>0:30ごろ<\/td><\/tr><tr><td>0:35<\/td><td>0:37ごろ<\/td><\/tr><tr><td>0:41<\/td><td>0:43ごろ<\/td><\/tr><tr><td>0:47<\/td><td>0:49ごろ<\/td><\/tr><tr><td>0:55<\/td><td>0:57ごろ<\/td><\/tr><\/tbody><\/table><\/div>", "<p>このほか、0:14五反田発の大崎行がある。<\/p><h3><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>・外回り（品川側から）<\/h3><div class=\"table-wrap\"><table><thead><tr><th>品川発<\/th><th>大崎到着見込み<\/th><\/tr><\/thead><tbody><tr><td>0:26<\/td><td>0:29ごろ<\/td><\/tr><tr><td>0:31<\/td><td>0:34ごろ<\/td><\/tr><tr><td>0:38<\/td><td>0:41ごろ<\/td><\/tr><tr><td>0:43<\/td><td>0:46ごろ<\/td><\/tr><\/tbody><\/table><\/div>", "<p>このほか、0:04品川発の大崎行がある。<\/p><h3><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>・内回り（五反田側から）<\/h3><div class=\"table-wrap\"><table><thead><tr><th>五反田発<\/th><th>大崎到着見込み<\/th><\/tr><\/thead><tbody><tr><td>0:28<\/td><td>0:30ごろ<\/td><\/tr><tr><td>0:35<\/td><td>0:37ごろ<\/td><\/tr><tr><td>0:47<\/td><td>0:49ごろ<\/td><\/tr><tr><td>0:55<\/td><td>0:57ごろ<\/td><\/tr><\/tbody><\/table><\/div>", "<p>このほか、0:14五反田発の大崎行がある。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<h3><span class=\"day weekday\">平日<\/span><\/h3><ul><li>調査推奨時間：0:15～1:05ごろ<\/li><li>特に注目する時間：0:20～1:00ごろ<\/li><li>最後の大崎止まり到着見込み：0:57ごろ<\/li><\/ul><h3><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h3><ul><li>調査推奨時間：0:15～1:05ごろ<\/li><li>特に注目する時間：0:20～1:00ごろ<\/li><li>最後の大崎止まり到着見込み：0:57ごろ<\/li><\/ul>", "<p>0:20前後に山手線の各方向の最終列車が大崎駅を出発する。その後は品川側と五反田側の両方から大崎止まりが続き、最後の列車は0:57ごろの到着が見込まれる。降車、改札通過、駅前への移動時間を考慮すると、1:05ごろまでの観察が適当と考えられる。<\/p><h3>現地で確認したいこと<\/h3><p>大崎駅で終電を逃した利用客と、山手線の大崎止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、各路線の最終列車と深夜の大崎止まり列車を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>山手線大崎止まりの到着ホームと、利用客が向かう改札<\/li><li>北改札口と南改札口への人流の違い<\/li><li>大崎止まり到着後、改札から出てくるまでの所要時間<\/li><li>改札外へ出る人と、構内で待機・移動する人の割合<\/li><li>0:29～0:37、0:40～0:50、0:57ごろの人数の集中<\/li><li>JR線とりんかい線の乗り換えを試みる利用客の動き<\/li><\/ul>", "<ul><li>タクシー、送迎車、徒歩、シェアサイクルなどへの移動<\/li><li>駅前で電話、経路検索、宿泊先検索をする人<\/li><li><span class=\"day weekday\">平日<\/span>と<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>の大崎止まり本数の違い<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本 大崎駅、東京臨海高速鉄道りんかい線 大崎駅<\/li><li>時刻表：JR東日本および東京臨海高速鉄道の公式サイトで2026年6月11日に確認<\/li><\/ul><ul><li>本資料は2026年6月11日に閲覧した公式時刻表を基にしている。<\/li><li>JR東日本の時刻表は「JR時刻表」2026年6月号に基づく表示である。<\/li><li>りんかい線公式時刻表の改正日は2026年3月14日である。<\/li><li>山手線大崎止まりの到着時刻は、隣駅の公式発車時刻から算出した見込みであり、公式の到着時刻そのものではない。<\/li><li>「24時」は翌日の0時として表記した。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><\/ul>", "<ul><li>調査当日に各社公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「大崎駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0319.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0319.html<\/a><\/p><ul><li>JR東日本「大崎駅 山手線 外回り・<span class=\"day weekday\">平日<\/span>」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/2606/timetable/tt0319/0319040.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/2606/t r><td>埼京線・南行<\/td><td>23:58<\/td><td>新宿<\/td><\/tr><tr><td>湘南新宿ライン・北行<\/td><td>23:40<\/td><td>籠原<\/td><\/tr><tr><td>湘南新宿ライン・南行<\/td><td>22:52<\/td><td>国府津<\/td><\/tr><tr><td>山手線・外回り（上野・東京方面）<\/td><td>0:21<\/td><td>品川<\/td><\/tr><tr><td>山手線・内回り（新宿・渋谷方面）<\/td><td>0:31<\/td><td>大崎<\/td><\/tr><\/tbody><\/table><\/div>", "<h4>埼京線北行・行き先別の実質最終<\/h4><p>最終列車だけを見ると北行は0:22赤羽行である。ただし、赤羽より先へ行ける列車はその前に終わる。<\/p><div class=\"table-wrap\"><table><thead><tr><th>行ける範囲<\/th><th>池袋駅発<\/th><th>行き先<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>川越まで<\/td><td>23:52<\/td><td>川越<\/td><td>大宮より先、川越線方面へ行ける最後<\/td><\/tr><tr><td>大宮まで<\/td><td>0:05<\/td><td>大宮<\/td><td>赤羽より先へ行ける最後<\/td><\/tr><tr><td>赤羽まで<\/td><td>0:22<\/td><td>赤羽<\/td><td>埼京線北行としての最終<\/td><\/tr><\/tbody><\/table><\/div><h4><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h4>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>池袋駅発<\/th><th>行き先<\/th><\/tr><\/thead><tbody><tr><td>埼京線・北行<\/td><td>0:22<\/td><td>赤羽<\/td><\/tr><tr><td>埼京線・南行<\/td><td>23:58<\/td><td>新宿<\/td><\/tr><tr><td>湘南新宿ライン・北行<\/td><td>23:40<\/td><td>籠原<\/td><\/tr><tr><td>湘南新宿ライン・南行<\/td><td>22:52<\/td><td>国府津<\/td><\/tr><tr><td>山手線・外回り（上野・東京方面）<\/td><td>0:21<\/td><td>品川<\/td><\/tr><tr><td>山手線・内回り（新宿・渋谷方面）<\/td><td>0:31<\/td><td>大崎<\/td><\/tr><\/tbody><\/table><\/div>", "<h4>埼京線北行・行き先別の実質最終<\/h4><div class=\"table-wrap\"><table><thead><tr><th>行ける範囲<\/th><th>池袋駅発<\/th><th>行き先<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>川越まで<\/td><td>23:52<\/td><td>川越<\/td><td>大宮より先、川越線方面へ行ける最後<\/td><\/tr><tr><td>大宮まで<\/td><td>0:05<\/td><td>大宮<\/td><td>赤羽より先へ行ける最後<\/td><\/tr><tr><td>赤羽まで<\/td><td>0:22<\/td><td>赤羽<\/td><td>埼京線北行としての最終<\/td><\/tr><\/tbody><\/table><\/div><h3>東京メトロ<\/h3><h4><span class=\"day weekday\">平日<\/span><\/h4>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>池袋駅発<\/th><th>行き先<\/th><\/tr><\/thead><tbody><tr><td>丸ノ内線・荻窪方面<\/td><td>0:20<\/td><td>茗荷谷<\/td><\/tr><tr><td>有楽町線・新木場方面<\/td><td>23:59<\/td><td>新木場<\/td><\/tr><tr><td>有楽町線・和光市方面<\/td><td>0:13<\/td><td>和光市方面<\/td><\/tr><tr><td>副都心線・渋谷方面<\/td><td>0:14<\/td><td>渋谷<\/td><\/tr><tr><td>副都心線・和光市方面<\/td><td>0:11<\/td><td>和光市・西武線方面<\/td><\/tr><\/tbody><\/table><\/div><h4><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h4>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>池袋駅発<\/th><th>行き先<\/th><\/tr><\/thead><tbody><tr><td>丸ノ内線・荻窪方面<\/td><td>0:20<\/td><td>茗荷谷<\/td><\/tr><tr><td>有楽町線・新木場方面<\/td><td>23:59<\/td><td>新木場<\/td><\/tr><tr><td>有楽町線・和光市方面<\/td><td>0:13<\/td><td>和光市方面<\/td><\/tr><tr><td>副都心線・渋谷方面<\/td><td>0:14<\/td><td>渋谷<\/td><\/tr><tr><td>副都心線・和光市方面<\/td><td>0:11<\/td><td>和光市・西武線方面<\/td><\/tr><\/tbody><\/table><\/div>", "<p>丸ノ内線は池袋始発で、最終は茗荷谷行である。有楽町線・副都心線の北行は和光市から東武東上線、小竹向原から西武線へ直通する列車を含むため、列車ごとに行き先を確認する必要がある。<\/p><h3>西武池袋線<\/h3><div class=\"table-wrap\"><table><thead><tr><th>曜日<\/th><th>最終出発<\/th><th>行き先<\/th><th>種別<\/th><\/tr><\/thead><tbody><tr><td><span class=\"day weekday\">平日<\/span><\/td><td>0:18<\/td><td>保谷<\/td><td>各駅停車<\/td><\/tr><tr><td><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/td><td>0:18<\/td><td>保谷<\/td><td>各駅停車<\/td><\/tr><\/tbody><\/table><\/div>", "<p>小手指方面の最終は0:14発準急小手指行である。路線全体の最終0:18発は保谷までの運転となる。<\/p><h3>東武東上線<\/h3><p>東武東上線は池袋発の最終だけでなく、北池袋側から池袋に着く終着列車も見る。北池袋発池袋方面の時刻表では、24時台に池袋行があり、最後は24:28発である。北池袋から池袋までは短距離のため、東武側改札は0:30前後まで観察対象に入れる。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>池袋は、山手線の池袋止まりに加えて、東武東上線、西武池袋線、丸ノ内線が池袋を終端とする。終電調査では「池袋駅を出る最終列車」だけでなく、「池袋駅に着いて終わる列車」も別に見る。<\/p><h3><span class=\"day weekday\">平日<\/span><\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>系統<\/th><th>手前駅・確認駅<\/th><th>発車時刻<\/th><th>池袋到着見込み<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>山手線・上野、大塚側から<\/td><td>上野<\/td><td>0:20、0:27、0:36、0:46<\/td><td>0:36、0:43、0:52、1:02ごろ<\/td><td>最後の大きな池袋止まり。全体最終の中心<\/td><\/tr><tr><td>山手線・新宿、目白側から<\/td><td>新宿<\/td><td>0:20、0:29、0:36、0:44<\/td><td>0:29、0:38、0:45、0:53ごろ<\/td><td>西側からの池袋止まり<\/td><\/tr><tr><td>東武東上線<\/td><td>北池袋<\/td><td>23:04、23:12、23:21、23:28、23:36、23:43、23:56、24:15、24:28<\/td><td>北池袋発の約2分後<\/td><td>東武側改札は0:30前後まで見る<\/td><\/tr><tr><td>西武池袋線<\/td><td>椎名町<\/td><td>23:05、23:14、23:23、23:32、23:43、23:55、0:07<\/td><td>椎名町発の約3分後<\/td><td>西武側は0:10前後が目安<\/td><\/tr><tr><td>丸ノ内線<\/td><td>新大塚<\/td><td>23:03、23:11、23:19、23:27、0:03、0:11、0:19、0:27<\/td><td>新大塚発の約2分後<\/td><td>丸ノ内線側は0:30前後が目安<\/td><\/tr><\/tbody><\/table><\/div><h3><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>系統<\/th><th>手前駅・確認駅<\/th><th>発車時刻<\/th><th>池袋到着見込み<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>山手線・上野、大塚側から<\/td><td>上野<\/td><td>0:21、0:27、0:36、0:47<\/td><td>0:37、0:43、0:52、1:03ごろ<\/td><td>最後の大きな池袋止まり。全体最終の中心<\/td><\/tr><tr><td>山手線・新宿、目白側から<\/td><td>新宿<\/td><td>0:20、0:29、0:36、0:44<\/td><td>0:29、0:38、0:45、0:53ごろ<\/td><td>西側からの池袋止まり<\/td><\/tr><tr><td>東武東上線<\/td><td>北池袋<\/td><td>23時台後半～24:28<\/td><td>北池袋発の約2分後<\/td><td>連携時刻表上は24:28池袋行を確認。<span class=\"day holiday\">土<span class=\"day holiday\">休日<\/span><\/span>は当日画面でも再確認<\/td><\/tr><tr><td>西武池袋線<\/td><td>椎名町<\/td><td>23:04、23:14、23:24、23:33、23:49、23:54、0:07<\/td><td>椎名町発の約3分後<\/td><td>西武側は0:10前後が目安<\/td><\/tr><tr><td>丸ノ内線<\/td><td>新大塚<\/td><td>23:00、23:06、23:13、23:19、23:26、23:32、23:39、23:47、23:56、0:03、0:11、0:19、0:27<\/td><td>新大塚発の約2分後<\/td><td>丸ノ内線側は0:30前後が目安<\/td><\/tr><\/tbody><\/table><\/div>", "<p>有楽町線・副都心線は池袋を通る路線で、通常は和光市方面、新木場方面、渋谷方面へ抜ける列車が中心となる。池袋止まりとして見る対象は、山手線、東武東上線、西武池袋線、丸ノ内線を優先する。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：0:00～1:15ごろ<\/li><li>特に注目する時間：0:15～1:10ごろ<\/li><li>山手線池袋止まりの最終到着見込み：<span class=\"day weekday\">平日<\/span>1:02ごろ、<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>1:03ごろ<\/li><li>埼京線北行の行き先別最終：23:52川越行、0:05大宮行、0:22赤羽行を分けて見る<\/li><\/ul><p>西武池袋線は0:10前後、東武東上線と丸ノ内線は0:30前後、山手線池袋止まりは1:02～1:03ごろまで到着が続く。埼京線北行は0:22赤羽行が路線としての最終だが、赤羽より先へ行ける列車は0:05大宮行が最後で、川越線方面は23:52川越行が最後である。駅が大きく改札から出口まで時間がかかるため、1:10～1:15ごろまで観察するのが適当と考えられる。<\/p>", "<h3>現地で確認したいこと<\/h3><p>池袋駅で終電を逃した利用客と、池袋止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、JR、東武東上線、西武池袋線、丸ノ内線、有楽町線、副都心線の深夜ダイヤを整理する。埼京線北行は、赤羽まで、大宮まで、川越までの実質最終を分けて確認する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>JR中央改札、東武、西武、メトロ各改札での人流の違い<\/li><li>東口、西口、北口、南口への分散<\/li><li>0:11～0:31の乗り換え客の動き<\/li><li>埼京線北行の23:52川越行、0:05大宮行、0:22赤羽行を逃した利用客の違い<\/li><li>山手線池袋止まりから各出口へ出るまでの所要時間<\/li><li>1:02～1:03ごろの最後の山手線到着後の降車人数<\/li><\/ul>", "<ul><li>0:30前後の東武東上線、丸ノ内線の終着到着後の人流<\/li><li>0:10前後の西武池袋線終着到着後の人流<\/li><li>タクシー、深夜バス、繁華街、宿泊施設方面への移動<\/li><li>東武東上線の当日最終発車時刻と上り最終到着時刻<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本・東武鉄道・西武鉄道・東京メトロ 池袋駅<\/li><li>時刻表：各鉄道事業者の公式サイトで確認<\/li><\/ul><ul><li>本資料は2026年6月12日に閲覧した公式時刻表を基にしている。<\/li><li>JR東日本の表示は「JR時刻表」2026年6月号に基づく。<\/li><li>東京メトロは公式印刷用時刻表PDF、西武池袋線は公式時刻表で確認した。<\/li><li>東武東上線は東武公式駅ページから案内されるNAVITIME連携時刻表で確認した。<span class=\"day holiday\">土<span class=\"day holiday\">休日<\/span><\/span>は当日の駅発車案内でも再確認する。<\/li><li>池袋到着時刻は手前駅の公式発車時刻から算出した見込みである。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「池袋駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0108.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0108.html<\/a><\/p><ul><li>JR東日本「上野駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0204.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0204.html<\/a><\/p><ul><li>JR東日本「新宿駅 時刻表」<\/li><\/ul>", "<p><a href=\"https://timetables.jreast.co.jp/timetable/list0866.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0866.html<\/a><\/p><ul><li>東京メトロ「池袋駅 時刻表」<\/li><\/ul><p><a href=\"https://www.tokyometro.jp/station/ikebukuro/timetable/index.html\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/ikebukuro/timetable/index.html<\/a><\/p><ul><li>東京メトロ「丸ノ内線 新大塚駅 印刷用時刻表」<\/li><\/ul><p><a href=\"https://www.tokyometro.jp/station/timetable/pdf/202603/M24.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/timetable/pdf/202603/M24.pdf<\/a><\/p>", "<ul><li>西武鉄道「池袋駅」<\/li><\/ul><p><a href=\"https://www.seiburailway.jp/railway/station/ikebukuro/\" target=\"_blank\" rel=\"noreferrer\">https://www.seiburailway.jp/railway/station/ikebukuro/<\/a><\/p><ul><li>西武鉄道「椎名町駅 池袋方面 時刻表」<\/li><\/ul><p><a href=\"https://seibu.ekitan.com/norikae/timetable/station/235-1/d1?dw=0\" target=\"_blank\" rel=\"noreferrer\">https://seibu.ekitan.com/norikae/timetable/station/235-1/d1?dw=0<\/a><\/p><ul><li>西武鉄道「椎名町駅 池袋方面 時刻表（<span class=\"day holiday\">土<span class=\"day holiday\">休日<\/span><\/span>）」<\/li><\/ul>", "<p><a href=\"https://seibu.ekitan.com/norikae/timetable/station/235-1/d1?dw=1\" target=\"_blank\" rel=\"noreferrer\">https://seibu.ekitan.com/norikae/timetable/station/235-1/d1?dw=1<\/a><\/p><ul><li>東武鉄道「池袋駅」<\/li><\/ul><p><a href=\"https://www.tobu.co.jp/railway/guide/station/info/7105/\" target=\"_blank\" rel=\"noreferrer\">https://www.tobu.co.jp/railway/guide/station/info/7105/<\/a><\/p><ul><li>NAVITIME「北池袋駅 東武東上線 池袋方面 時刻表」<\/li><\/ul>", "<p><a href=\"https://www.navitime.co.jp/diagram/timetable?node=00008370&amp;lineId=00000808&amp;updown=0\" target=\"_blank\" rel=\"noreferrer\">https://www.navitime.co.jp/diagram/timetable?node=00008370&amp;lineId=00000808&amp;updown=0<\/a><\/p>"]}]}, {"name": "品川駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>品川駅には、JR東日本の東海道線、上野東京ライン、常磐線直通、山手線、横須賀線、京浜東北線、成田エクスプレス、JR東海の東海道新幹線、京浜急行電鉄の京急本線が乗り入れている。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>品川駅の次の停車駅<\/th><\/tr><\/thead><tbody><tr><td>東海道線・下り<\/td><td>川崎、横浜、小田原、熱海方面<\/td><td>川崎 ><td>京浜東北線・南行<\/td><td>0:46<\/td><td>蒲田<\/td><td>普通<\/td><\/tr><tr><td>京浜東北線・北行<\/td><td>0:30<\/td><td>上野<\/td><td>普通<\/td><\/tr><\/tbody><\/table><\/div><h4>京浜東北線・行き先別の実質最終<\/h4><p>最終列車だけを見ると南行は0:46蒲田行、北行は0:30上野行である。ただし、蒲田・上野より先へ行ける列車はその前に終わる。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>品川駅発<\/th><th>行き先<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>南行<\/td><td>大船まで<\/td><td>23:53<\/td><td>大船<\/td><td>根岸線方面まで届く最終より早い<\/td><\/tr><tr><td>南行<\/td><td>横浜・桜木町方面まで<\/td><td>0:10<\/td><td>桜木町<\/td><td>蒲田より先へ行ける最後<\/td><\/tr><tr><td>南行<\/td><td>磯子方面まで<\/td><td>0:05<\/td><td>磯子<\/td><td>根岸線方面の実質最終<\/td><\/tr><tr><td>北行<\/td><td>大宮まで<\/td><td>23:47<\/td><td>大宮<\/td><td>上野より先の埼玉方面へ行ける最後の大宮行<\/td><\/tr><tr><td>北行<\/td><td>南浦和まで<\/td><td>0:09<\/td><td>南浦和<\/td><td>上野より先へ行ける最後<\/td><\/tr><tr><td>北行<\/td><td>上野まで<\/td><td>0:30<\/td><td>上野<\/td><td>路線としての最終<\/td><\/tr><\/tbody><\/table><\/div>", "<h4>JR在来線・<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h4>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>最終出発<\/th><th>行き先<\/th><th>種別<\/th><\/tr><\/thead><tbody><tr><td>東海道線・下り<\/td><td>0:04<\/td><td>平塚<\/td><td>普通<\/td><\/tr><tr><td>東海道線・上野東京ライン北行<\/td><td>23:39<\/td><td>東京<\/td><td>普通<\/td><\/tr><tr><td>上野東京ライン・常磐線方面<\/td><td>22:56<\/td><td>土浦<\/td><td>普通<\/td><\/tr><tr><td>山手線・外回り（渋谷・新宿方面）<\/td><td>0:43<\/td><td>大崎<\/td><td>普通<\/td><\/tr><tr><td>山手線・内回り（東京・上野方面）<\/td><td>0:25<\/td><td>池袋<\/td><td>普通<\/td><\/tr><tr><td>横須賀線・下り<\/td><td>23:59<\/td><td>大船<\/td><td>普通<\/td><\/tr><\/tbody><\/table><\/div>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>最終出発<\/th><th>行き先<\/th><th>種別<\/th><\/tr><\/thead><tbody><tr><td>横須賀・総武快速線・上り<\/td><td>23:52<\/td><td>千葉<\/td><td>普通・総武線内快速<\/td><\/tr><tr><td>京浜東北線・南行<\/td><td>0:46<\/td><td>蒲田<\/td><td>普通<\/td><\/tr><tr><td>京浜東北線・北行<\/td><td>0:30<\/td><td>上野<\/td><td>普通<\/td><\/tr><\/tbody><\/table><\/div><h4>京浜東北線・行き先別の実質最終<\/h4>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>品川駅発<\/th><th>行き先<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>南行<\/td><td>大船まで<\/td><td>23:53<\/td><td>大船<\/td><td>根岸線方面まで届く最終より早い<\/td><\/tr><tr><td>南行<\/td><td>横浜・桜木町方面まで<\/td><td>0:10<\/td><td>桜木町<\/td><td>蒲田より先へ行ける最後<\/td><\/tr><tr><td>南行<\/td><td>磯子方面まで<\/td><td>0:05<\/td><td>磯子<\/td><td>根岸線方面の実質最終<\/td><\/tr><tr><td>北行<\/td><td>大宮まで<\/td><td>23:47<\/td><td>大宮<\/td><td>上野より先の埼玉方面へ行ける最後の大宮行<\/td><\/tr><tr><td>北行<\/td><td>南浦和まで<\/td><td>0:09<\/td><td>南浦和<\/td><td>上野より先へ行ける最後<\/td><\/tr><tr><td>北行<\/td><td>上野まで<\/td><td>0:30<\/td><td>上野<\/td><td>路線としての最終<\/td><\/tr><\/tbody><\/table><\/div>", "<p>山手線外回りの最後の列車は大崎止まりである。池袋方面まで移動できる最終は、<span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも0:20品川発となる。<\/p><h3>東海道新幹線の最終列車<\/h3><p>2026年6月11日のJR東海公式発車順序案内で確認した。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>最終出発<\/th><th>列車<\/th><th>行き先<\/th><\/tr><\/thead><tbody><tr><td>下り<\/td><td>22:55<\/td><td>こだま915号<\/td><td>三島<\/td><\/tr><tr><td>上り<\/td><td>23:39<\/td><td>のぞみ64号<\/td><td>東京<\/td><\/tr><\/tbody><\/table><\/div>", "<p>下りの主な遠距離方面では、新大阪行の最終が21:31、名古屋行の最終が22:10である。その後は静岡行22:19、三島行22:55となる。<\/p><p>新幹線は在来線・京急線より早く終了するため、0時台の駅外流出を直接生む路線ではない。ただし、最終新幹線到着後の在来線・京急線への乗り換え失敗は観察対象となり得る。<\/p><h3>京急線の最終列車<\/h3><p>京急公式の品川駅標準時刻表は、<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>が2025年12月13日改正、<span class=\"day weekday\">平日<\/span>が2025年12月15日改正である。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>曜日<\/th><th>方向<\/th><th>最終出発<\/th><th>行き先<\/th><th>種別<\/th><\/tr><\/thead><tbody><tr><td><span class=\"day weekday\">平日<\/span><\/td><td>上り・泉岳寺方面<\/td><td>0:00<\/td><td>泉岳寺<\/td><td>普通<\/td><\/tr><tr><td><span class=\"day weekday\">平日<\/span><\/td><td>下り・羽田空港、横浜方面<\/td><td>0:06<\/td><td>京急川崎<\/td><td>普通<\/td><\/tr><tr><td><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/td><td>上り・泉岳寺方面<\/td><td>23:57<\/td><td>泉岳寺<\/td><td>急行<\/td><\/tr><tr><td><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/td><td>下り・羽田空港、横浜方面<\/td><td>0:06<\/td><td>京急川崎<\/td><td>普通<\/td><\/tr><\/tbody><\/table><\/div><p>空港方面や横浜以遠へ向かう列車は、上表の最終列車より早く終了する。調査時には、単純な「京急線最終」だけでなく、羽田空港・横浜・三浦半島方面の目的地別最終を逃した利用客にも注意する。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<h3>山手線・田町側から<\/h3><p>田町駅の山手線外回り公式時刻表から「品川行」を抽出した。田町駅からは高輪ゲートウェイ駅を経由し、品川駅まで通常約4分として到着時刻を見込んだ。<\/p><h4><span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>共通<\/h4>", "<div class=\"table-wrap\"><table><thead><tr><th>田町発<\/th><th>品川到着見込み<\/th><\/tr><\/thead><tbody><tr><td>0:45<\/td><td>0:49ごろ<\/td><\/tr><tr><td>0:50<\/td><td>0:54ごろ<\/td><\/tr><tr><td>0:55<\/td><td>0:59ごろ<\/td><\/tr><\/tbody><\/table><\/div><h3>山手線・大崎側から<\/h3>", "<p>大崎駅の山手線内回りは「品川・東京方面」であり、品川駅には到着する。ただし公式時刻表上、深夜帯に大崎発の「品川行」は確認できない。大崎側から来る列車は品川で終着せず、環状運転または池袋行として先へ進むため、「品川駅に着く終着列車」としては数えない。<\/p><div class=\"table-wrap\"><table><thead><tr><th>曜日<\/th><th>手前駅・確認駅<\/th><th>確認結果<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td><span class=\"day weekday\">平日<\/span><\/td><td>大崎<\/td><td>品川行は確認できない。深夜帯は環状運転または池袋行<\/td><td>品川止まりの降車客として扱わない<\/td><\/tr><tr><td><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/td><td>大崎<\/td><td>品川行は確認できない。深夜帯は環状運転または池袋行<\/td><td>品川止まりの降車客として扱わない<\/td><\/tr><\/tbody><\/table><\/div><h3>京急線・北品川側から<\/h3>", "<p>北品川駅の上り公式時刻表では、<span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも0:16発が品川行の最終である。通常の駅間所要時間から、品川駅には0:18ごろ到着すると見込まれる。<\/p><p>北品川駅からの主な品川行は次のとおり。<\/p><div class=\"table-wrap\"><table><thead><tr><th>曜日<\/th><th>北品川発<\/th><\/tr><\/thead><tbody><tr><td><span class=\"day weekday\">平日<\/span><\/td><td>23:10、23:24、23:35、23:55、0:16<\/td><\/tr><tr><td><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/td><td>23:10、23:27、23:39、23:53、0:16<\/td><\/tr><\/tbody><\/table><\/div>", "<p>京浜東北線については、田町駅の深夜時刻表上に品川行は確認できなかった。0時台の南行列車は蒲田方面まで運転する。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<h3><span class=\"day weekday\">平日<\/span><\/h3><ul><li>調査推奨時間：0:10～1:10ごろ<\/li><li>特に注目する時間：0:15～1:05ごろ<\/li><li>最後の品川止まり到着見込み：0:59ごろ（山手線）<\/li><li>京浜東北線の行き先別最終：南行は0:10桜木町行、北行は0:09南浦和行が、蒲田・上野より先へ行ける最後<\/li><\/ul><h3><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/h3>", "<ul><li>調査推奨時間：0:10～1:10ごろ<\/li><li>特に注目する時間：0:15～1:05ごろ<\/li><li>最後の品川止まり到着見込み：0:59ごろ（山手線）<\/li><li>京浜東北線の行き先別最終：南行は0:10桜木町行、北行は0:09南浦和行が、蒲田・上野より先へ行ける最後<\/li><\/ul><p>0:18ごろに京急線の最後の品川止まりが到着する。その後もJR線は運転を続け、京浜東北線は北行0:30上野行、南行0:46蒲田行まで残る。ただし蒲田・上野より先へ行ける列車は南行0:10桜木町行、北行0:09南浦和行が最後である。田町側から来る山手線品川止まりは0:59ごろまで到着するため、改札通過時間を含めて1:10ごろまでの観察が適当と考えられる。<\/p>", "<h3>現地で確認したいこと<\/h3><p>品川駅で終電を逃した利用客と、品川止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、JR在来線、東海道新幹線、京急線の最終列車と深夜の品川止まり列車を整理する。京浜東北線は「蒲田・上野止まりの最終」と「それより先へ行ける実質最終」を分けて見る。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>JR高輪口・港南口・京急高輪口での人流の違い<\/li><li>山手線品川止まり到着後、利用客が改札へ出るまでの時間<\/li><li>京急線品川止まりの降車客がJRへ向かうか、駅外へ出るか<\/li><li>0:18、0:49、0:54、0:59ごろの降車人数<\/li><li>京浜東北線の0:09南浦和行、0:10桜木町行、0:30上野行、0:46蒲田行を逃した利用客の違い<\/li><li>終電後に高輪口と港南口のどちらへ移動する人が多いか<\/li><\/ul>", "<ul><li>タクシー乗り場、送迎車、ホテル方面へ向かう人の動き<\/li><li>羽田空港方面の列車を逃した利用客の行動<\/li><li>新幹線から在来線・京急線への最終乗り換え状況<\/li><li>駅前で電話、経路検索、宿泊先検索をする人<\/li><li><span class=\"day weekday\">平日<\/span>と<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>の京急上り最終時刻の違い<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本・JR東海・京浜急行電鉄 品川駅<\/li><li>時刻表：各鉄道事業者の公式サイトで2026年6月11日に確認<\/li><\/ul><ul><li>本資料は2026年6月11日に閲覧した公式時刻表を基にしている。<\/li><li>JR東日本の時刻表は「JR時刻表」2026年6月号に基づく表示である。<\/li><li>東海道新幹線は調査日のJR東海公式発車順序案内で確認した。臨時列車の運転日により最終列車の列車番号などが変わる可能性がある。<\/li><li>山手線と京急線の品川到着時刻は、隣駅の公式発車時刻から算出した見込みである。<\/li><li>大崎側からの山手線は品川に到着するが、品川行の終着列車としては確認できなかった。<\/li><li>京急線は目的地により実質的な最終列車が大きく異なる。<\/li><\/ul>", "<ul><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に各社公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「品川駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0788.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0788.html<\/a><\/p><ul><li>JR東日本「田町駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0976.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0976.html<\/a><\/p><ul><li>JR東日本「大崎駅 時刻表」<\/li><\/ul>", "<p><a href=\"https://timetables.jreast.co.jp/timetable/list0319.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0319.html<\/a><\/p><ul><li>JR東海「品川駅 博多方面（下り）発車順序案内」<\/li><\/ul><p><a href=\"https://traininfo.jr-central.co.jp/shinkansen/sp/ja/ti04.html?station=2&amp;bound=2\" target=\"_blank\" rel=\"noreferrer\">https://traininfo.jr-central.co.jp/shinkansen/sp/ja/ti04.html?station=2&amp;bound=2<\/a><\/p><ul><li>JR東海「品川駅 東京方面（上り）発車順序案内」<\/li><\/ul>", "<p><a href=\"https://traininfo.jr-central.co.jp/shinkansen/sp/ja/ti04.html?station=2&amp;bound=1\" target=\"_blank\" rel=\"noreferrer\">https://traininfo.jr-central.co.jp/shinkansen/sp/ja/ti04.html?station=2&amp;bound=1<\/a><\/p><ul><li>JR東海「品川駅 駅の時刻表」<\/li><\/ul><p><a href=\"https://railway.jr-central.co.jp/station-guide/shinkansen/shinagawa/jikoku.html\" target=\"_blank\" rel=\"noreferrer\">https://railway.jr-central.co.jp/station-guide/shinkansen/shinagawa/jikoku.html<\/a><\/p><ul><li>京浜急行電鉄「品川駅時刻表」<\/li><\/ul>", "<p><a href=\"https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK01.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK01.pdf<\/a><\/p><ul><li>京浜急行電鉄「北品川駅時刻表」<\/li><\/ul><p><a href=\"https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK02.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK02.pdf<\/a><\/p>"]}]}, {"name": "自由が丘駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>自由が丘駅には、東急東横線と東急大井町線が乗り入れている。東横線は渋谷方面と横浜・元町・中華街方面、大井町線は大井町方面と二子玉川・溝の口方面を結ぶ。深夜帯は東横線・大井町線とも遠方到達列車が先に終わり、最後は区間行きが残る。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>東急東横線・渋谷方面<\/td><td>渋谷、新宿三丁目、池袋方面<\/td><td>都立大学<\/td><\/tr><tr><td>東急東横線・横浜方面<\/td><td>武蔵小杉、菊名、横浜、元町・中華街方面<\/td><td>田園調布<\/td><\/tr><tr><td>東急大井町線・大井町方面<\/td><td>大岡山、旗の台、大井町方面<\/td><td>緑が丘<\/td><\/tr><tr><td>東急大井町線・溝の口方面<\/td><td>二子玉川、溝の口方面<\/td><td>九品仏<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>東横線・渋谷方面<\/td><td>0:19<\/td><td>渋谷<\/td><td>普通<\/td><\/tr><tr><td>東横線・横浜方面<\/td><td>0:00<\/td><td>元町・中華街<\/td><td>各停<\/td><\/tr><tr><td>東横線・横浜方面<\/td><td>0:14<\/td><td>横浜<\/td><td>各停<\/td><\/tr><tr><td>東横線・横浜方面<\/td><td>0:24<\/td><td>菊名<\/td><td>各停・<span class=\"day weekday\">平日<\/span><\/td><\/tr><tr><td>東横線・横浜方面<\/td><td>0:37<\/td><td>元住吉<\/td><td>各停<\/td><\/tr><tr><td>大井町線・大井町方面<\/td><td>0:31<\/td><td>大井町<\/td><td>各停<\/td><\/tr><\/tbody><\/table><\/div>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>大井町線・溝の口方面<\/td><td>0:26<\/td><td>溝の口<\/td><td>各停・<span class=\"day weekday\">平日<\/span><\/td><\/tr><tr><td>大井町線・溝の口方面<\/td><td>0:37<\/td><td>二子玉川<\/td><td>各停<\/td><\/tr><\/tbody><\/table><\/div><h3>行き先別の実質最終<\/h3><p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>東横線下り<\/td><td>元町・中華街まで<\/td><td>0:00<\/td><td>この後は横浜、菊名、元住吉など区間行きになる<\/td><\/tr><tr><td>東横線下り<\/td><td>横浜まで<\/td><td>0:14<\/td><td>横浜方面へ届く最後の確認点<\/td><\/tr><tr><td>東横線上り<\/td><td>渋谷まで<\/td><td>0:19<\/td><td>渋谷より先へ乗り継ぐ余裕は小さい<\/td><\/tr><tr><td>大井町線上り<\/td><td>大井町まで<\/td><td>0:31<\/td><td>大岡山・旗の台方面の最後<\/td><\/tr><tr><td>大井町線下り<\/td><td>溝の口まで<\/td><td>0:26<\/td><td>0:37は二子玉川止まり<\/td><\/tr><\/tbody><\/table><\/div><h3>曜日別の確認<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>東横線・菊名まで<\/td><td>0:24 菊名行<\/td><td>0:23 菊名行<\/td><\/tr><tr><td>大井町線・溝の口まで<\/td><td>0:26 溝の口行<\/td><td>0:25 溝の口行<\/td><\/tr><tr><td>東横線・横浜方面の路線最終<\/td><td>0:37 元住吉行<\/td><td>0:37 元住吉行<\/td><\/tr><tr><td>大井町線・溝の口方面の路線最終<\/td><td>0:37 二子玉川行<\/td><td>0:37 二子玉川行<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅に着く最終列車", "pages": ["<p>自由が丘駅を終点とする深夜の定期列車は主対象ではない。調査では、自由が丘止まりよりも、東横線と大井町線の相互乗り換えに間に合わなかった利用客、横浜方面・溝の口方面に届かない区間行きから降りる利用客を中心に見る。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:45～0:55ごろ<\/li><li>特に注目する時間：0:00～0:40ごろ<\/li><li>東横線下りは0:00元町・中華街行、0:14横浜行、<span class=\"day weekday\">平日<\/span>0:24・<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>0:23菊名行、0:37元住吉行と、行ける範囲が段階的に短くなる。<\/li><li>大井町線は大井町方面0:31、溝の口方面は<span class=\"day weekday\">平日<\/span>0:26・<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>0:25、二子玉川止まり0:37を分けて見る。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>自由が丘駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>東横線から大井町線への最終乗り換え状況<\/li><li>横浜方面へ届かない元住吉行・菊名行の降車客<\/li><li>正面口、南口、北口の人流差<\/li><li>タクシー乗り場、バス停、徒歩帰宅の流れ<\/li><li>駅前で経路検索、電話、待ち合わせをする人<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：東急電鉄 自由が丘駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>東急線の時刻は東急公式サイトから案内される時刻表で確認した。<\/li><li>目的地別の実質最終は、路線としての最終列車より早い場合がある。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>東急電鉄「自由が丘駅」<\/li><\/ul><p><a href=\"https://www.tokyu.co.jp/area/jiyugaoka/station/\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyu.co.jp/area/jiyugaoka/station/<\/a><\/p><ul><li>東急公式連携時刻表「自由が丘駅 東横線」<\/li><\/ul><p><a href=\"https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00003330&amp;rrCd=00000790&amp;updown=1\" target=\"_blank\" rel=\"noreferrer\">https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00003330&amp;rrCd=00000790&amp;updown=1<\/a><\/p><ul><li>東急公式連携時刻表「自由が丘駅 大井町線」<\/li><\/ul>", "<p><a href=\"https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00003330&amp;rrCd=00000787&amp;updown=0\" target=\"_blank\" rel=\"noreferrer\">https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00003330&amp;rrCd=00000787&amp;updown=0<\/a><\/p>"]}]}, {"name": "中目黒駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>中目黒駅には、東急東横線と東京メトロ日比谷線が乗り入れている。日比谷線は中目黒が南側の起終点であり、東横線との乗り換え駅として深夜帯の乗り換え失敗が発生しやすい。<\/p><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>東急東横線・渋谷方面<\/td><td>渋谷、新宿三丁目、池袋方面<\/td><td>代官山<\/td><\/tr><tr><td>東急東横線・横浜方面<\/td><td>自由が丘、武蔵小杉、横浜方面<\/td><td>祐天寺<\/td><\/tr><tr><td>東京メトロ日比谷線・北千住方面<\/td><td>六本木、銀座、上野、北千住方面<\/td><td>恵比寿<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>東横線・渋谷方面<\/td><td>0:27<\/td><td>渋谷<\/td><td>各停<\/td><\/tr><tr><td>東横線・横浜方面<\/td><td>0:06<\/td><td>横浜<\/td><td>各停<\/td><\/tr><tr><td>東横線・横浜方面<\/td><td>0:16<\/td><td>菊名<\/td><td>各停・<span class=\"day weekday\">平日<\/span><\/td><\/tr><tr><td>東横線・横浜方面<\/td><td>0:27<\/td><td>元住吉<\/td><td>各停<\/td><\/tr><tr><td>日比谷線・北千住方面<\/td><td>0:28<\/td><td>広尾<\/td><td>普通・曜日別公式時刻表で確認<\/td><\/tr><\/tbody><\/table><\/div>", "<h3>行き先別の実質最終<\/h3><p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>東横線下り<\/td><td>横浜まで<\/td><td>0:06<\/td><td>この後は菊名・元住吉など区間行きになる<\/td><\/tr><tr><td>東横線下り<\/td><td>菊名まで<\/td><td>0:15<\/td><td>横浜までは届かない<\/td><\/tr><tr><td>東横線下り<\/td><td>元住吉まで<\/td><td>0:27<\/td><td>路線としての終盤<\/td><\/tr><tr><td>日比谷線<\/td><td>広尾まで<\/td><td>0:28<\/td><td>中目黒から1駅の区間最終<\/td><\/tr><\/tbody><\/table><\/div><h3>曜日別の確認<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>東横線・菊名まで<\/td><td>0:16 菊名行<\/td><td>0:15 菊名行<\/td><\/tr><tr><td>東横線・横浜方面の路線最終<\/td><td>0:27 元住吉行<\/td><td>0:27 元住吉行<\/td><\/tr><tr><td>日比谷線・路線最終<\/td><td>0:28 広尾行<\/td><td>0:28 広尾行<\/td><\/tr><\/tbody><\/table><\/div><p>日比谷線0:28は北千住行ではなく、中目黒から1駅の広尾行である。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>日比谷線は中目黒を起終点とするため、深夜帯には日比谷線から中目黒で降りる利用客が発生する。調査では、日比谷線到着客が東横線へ乗り換えられるか、または改札外へ流れるかを確認する。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:45～0:45ごろ<\/li><li>特に注目する時間：0:10～0:30ごろ<\/li><li>東横線下りは0:06横浜行、<span class=\"day weekday\">平日<\/span>0:16・<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>0:15菊名行、0:27元住吉行と行ける範囲が短くなる。<\/li><li>日比谷線0:28広尾行の終盤が東横線0:27前後と重なる。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>中目黒駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>東横線と日比谷線の最終乗り換え状況<\/li><li>正面改札、南改札、山手通り側の人流<\/li><li>代官山・恵比寿方面へ徒歩移動する人<\/li><li>目黒川沿い、タクシー、バス停方面への流れ<\/li><li>駅前で経路検索、電話、宿泊先検索をする人<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：東急電鉄・東京メトロ 中目黒駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>東急線は東急公式サイトから案内される時刻表、日比谷線は東京メトロ公式PDFで確認した。<\/li><li>日比谷線は中目黒駅で折り返すため、発車最終だけでなく到着後の乗り換え行動も見る。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>東急電鉄「中目黒駅」<\/li><\/ul><p><a href=\"https://www.tokyu.co.jp/area/naka-meguro/station/\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyu.co.jp/area/naka-meguro/station/<\/a><\/p><ul><li>東京メトロ「中目黒駅 時刻表」<\/li><\/ul><p><a href=\"https://www.tokyometro.jp/station/naka-meguro/timetable/index.html\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/naka-meguro/timetable/index.html<\/a><\/p><ul><li>東京メトロ「日比谷線 中目黒駅 印刷用時刻表」<\/li><\/ul>", "<p><a href=\"https://www.tokyometro.jp/station/timetable/pdf/202603/H01.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/timetable/pdf/202603/H01.pdf<\/a><\/p>"]}]}, {"name": "葛西駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>葛西駅は東京メトロ東西線の単独駅である。西側は日本橋、大手町、中野方面、東側は浦安、西船橋、東葉勝田台方面へ向かう。深夜帯は中野方面と西船橋方面で利用者の流れがはっきり分かれる。<\/p><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>東西線・中野方面<\/td><td>日本橋、大手町、飯田橋、中野方面<\/td><td>西葛西<\/td><\/tr><tr><td>東西線・西船橋方面<\/td><td>浦安、西船橋、東葉勝田台方面<\/td><td>浦安<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>東西線・中野方面<\/td><td>0:24<\/td><td>東陽町<\/td><td>東京メトロ公式曜日別時刻表で確認<\/td><\/tr><tr><td>東西線・西船橋方面<\/td><td>0:31<\/td><td>妙典<\/td><td>東京メトロ公式曜日別時刻表で確認<\/td><\/tr><\/tbody><\/table><\/div><h3>行き先別の実質最終<\/h3><p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>中野方面<\/td><td>都心側へ戻る<\/td><td>0:24ごろ<\/td><td>東陽町止まりの扱いに注意<\/td><\/tr><tr><td>西船橋方面<\/td><td>妙典まで<\/td><td>0:31<\/td><td>路線最終。西船橋へは届かない<\/td><\/tr><\/tbody><\/table><\/div><h3>曜日別の確認<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>方向・到達範囲<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>中野方面・路線最終<\/td><td>0:24 東陽町行<\/td><td>0:24 東陽町行<\/td><\/tr><tr><td>中野まで行ける最後<\/td><td>23:55 中野行<\/td><td>23:55 中野行<\/td><\/tr><tr><td>西船橋方面・路線最終<\/td><td>0:31 妙典行<\/td><td>0:31 妙典行<\/td><\/tr><tr><td>西船橋以遠へ行ける最後<\/td><td>0:17 東葉勝田台行<\/td><td>0:18 東葉勝田台行<\/td><\/tr><\/tbody><\/table><\/div><p>0:31妙典行は西船橋へ届かない。目的地別の実質最終と路線最終を分けて扱う。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>葛西駅を終点とする定期列車は深夜調査の主対象ではない。終電調査では、葛西で降りる利用客よりも、葛西から都心側・千葉側へ移動できなくなった利用客の行動を把握する。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:45～0:50ごろ<\/li><li>特に注目する時間：0:05～0:35ごろ<\/li><li>東西線は単一路線だが、中野方面と西船橋方面で終電後の行動が異なる。<\/li><li>西船橋方面は目的地によって、妙典・西船橋・東葉方面へ届くかが変わる。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>葛西駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>中野方面と西船橋方面の乗り遅れ客の違い<\/li><li>中央改札付近、環七側、バス停、タクシー乗り場の流れ<\/li><li>浦安・西葛西方面へ徒歩移動する人<\/li><li>終電後に都心側へ戻ろうとする人の経路検索<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：東京メトロ 葛西駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>東京メトロ東西線の公式時刻表PDFを基に整理した。<\/li><li>東西線は行先の途中止まりが多いため、時刻だけでなく行先を必ず記録する。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>東京メトロ「葛西駅 時刻表」<\/li><\/ul><p><a href=\"https://www.tokyometro.jp/station/kasai/timetable/index.html\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/kasai/timetable/index.html<\/a><\/p><ul><li>東京メトロ「東西線 葛西駅 印刷用時刻表」<\/li><\/ul><p><a href=\"https://www.tokyometro.jp/station/timetable/pdf/202603/T17.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/timetable/pdf/202603/T17.pdf<\/a><\/p>"]}]}, {"name": "赤羽駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>赤羽駅には、京浜東北線、埼京線、宇都宮線、高崎線、湘南新宿ラインなどが乗り入れる。都心方面と埼玉・北関東方面の結節点であり、深夜帯は行き先別の実質最終が重要になる。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>京浜東北線・南行<\/td><td>上野、東京、品川、蒲田方面<\/td><td>東十条<\/td><\/tr><tr><td>京浜東北線・北行<\/td><td>浦和、大宮方面<\/td><td>川口<\/td><\/tr><tr><td>埼京線・上り<\/td><td>池袋、新宿、大崎方面<\/td><td>十条<\/td><\/tr><tr><td>埼京線・下り<\/td><td>武蔵浦和、大宮、川越方面<\/td><td>北赤羽<\/td><\/tr><tr><td>宇都宮線・高崎線・下り<\/td><td>大宮、宇都宮、高崎方面<\/td><td>浦和<\/td><\/tr><tr><td>湘南新宿ライン<\/td><td>新宿、横浜方面／大宮方面<\/td><td>池袋／浦和<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>京浜東北線・南行<\/td><td>0:05<\/td><td>蒲田<\/td><td>普通<\/td><\/tr><tr><td>京浜東北線・北行<\/td><td>0:47<\/td><td>南浦和<\/td><td>普通<\/td><\/tr><tr><td>埼京線・大宮方面<\/td><td>0:13<\/td><td>大宮<\/td><td>普通<\/td><\/tr><tr><td>埼京線・新宿/大崎方面<\/td><td>0:45<\/td><td>池袋<\/td><td>普通<\/td><\/tr><tr><td>常磐ではなく宇都宮線・高崎線系統<\/td><td>23時台後半<\/td><td>大宮以北方面<\/td><td>行先別に確認<\/td><\/tr><\/tbody><\/table><\/div>", "<h3>行き先別の実質最終<\/h3><p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>京浜東北線南行<\/td><td>都心・蒲田方面<\/td><td>0:05<\/td><td>南側へ戻れる最後<\/td><\/tr><tr><td>京浜東北線北行<\/td><td>南浦和まで<\/td><td>0:47<\/td><td>大宮までは届かない区間行き<\/td><\/tr><tr><td>埼京線上り<\/td><td>池袋まで<\/td><td>0:45<\/td><td>新宿・大崎方面へ届く列車は前に終わる<\/td><\/tr><tr><td>埼京線下り<\/td><td>大宮まで<\/td><td>0:13<\/td><td>川越へは届かない区間最終<\/td><\/tr><\/tbody><\/table><\/div><h3>曜日別の確認<\/h3>", "<p>主要な最終時刻は<span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>で同じ。京浜東北線北行は0:47南浦和行、埼京線下りは0:13大宮行。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>赤羽では深夜帯に赤羽止まり、池袋止まり、浦和止まりなど、目的地に届かない区間行きが重要である。駅止まり列車そのものより、赤羽で降りて東口・西口へ出る人、または別路線へ乗り換えようとする人を観察する。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:50～1:10ごろ<\/li><li>特に注目する時間：0:10～0:55ごろ<\/li><li>京浜東北線南行は0:05蒲田行、北行は0:47南浦和行まで残る。<\/li><li>埼京線上りは0:45池袋行が終盤の観察点になる。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>赤羽駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>東口繁華街と西口バス・タクシー方面の分散<\/li><li>埼京線から京浜東北線への最終乗り換え<\/li><li>池袋止まり、浦和止まりなど目的地に届かない列車の降車客<\/li><li>赤羽止まり、途中駅止まり到着後の改札流出<\/li><li>駅前で経路検索、電話、宿泊先検索をする人<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本 赤羽駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>JR東日本の公式時刻表を基に整理した。<\/li><li>JR東日本の表示は「JR時刻表」2026年6月号に基づく。<\/li><li>赤羽は路線数が多いため、路線としての最終と目的地別の実質最終を分けて見る。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「赤羽駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0034.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0034.html<\/a><\/p>"]}]}, {"name": "北千住駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>北千住駅には、JR常磐線、東京メトロ千代田線・日比谷線、東武スカイツリーライン、つくばエクスプレスが乗り入れる。路線ごとに改札・ホームが分かれ、深夜帯の終電時刻差も大きい。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>JR常磐線・下り<\/td><td>松戸、柏、我孫子方面<\/td><td>松戸<\/td><\/tr><tr><td>JR常磐線・上り<\/td><td>日暮里、上野、品川方面<\/td><td>南千住<\/td><\/tr><tr><td>千代田線<\/td><td>綾瀬、松戸方面／大手町、代々木上原方面<\/td><td>町屋／綾瀬<\/td><\/tr><tr><td>日比谷線<\/td><td>上野、銀座、中目黒方面／東武線方面<\/td><td>南千住<\/td><\/tr><tr><td>東武スカイツリーライン<\/td><td>草加、北越谷、春日部方面<\/td><td>小菅<\/td><\/tr><tr><td>つくばエクスプレス<\/td><td>秋葉原方面／守谷、つくば方面<\/td><td>南千住／青井<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>JR常磐線・下り<\/td><td>0:43<\/td><td>松戸<\/td><td>快速<\/td><\/tr><tr><td>JR常磐線・上り<\/td><td>0:24<\/td><td>上野<\/td><td>快速<\/td><\/tr><tr><td>千代田線・綾瀬/松戸方面<\/td><td>0:48<\/td><td>松戸<\/td><td>北千住始発・曜日別公式時刻表で確認<\/td><\/tr><tr><td>日比谷線<\/td><td>0時台前半<\/td><td>北千住/南千住方面<\/td><td>東京メトロ公式PDFで確認<\/td><\/tr><\/tbody><\/table><\/div><h3>行き先別の実質最終<\/h3>", "<p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>JR常磐線下り<\/td><td>松戸まで<\/td><td>0:43<\/td><td>柏・我孫子方面へ届く列車は前に終わる可能性がある<\/td><\/tr><tr><td>JR常磐線上り<\/td><td>上野方面<\/td><td>0:24<\/td><td>都心側へ戻る最後の確認点<\/td><\/tr><tr><td>千代田線<\/td><td>綾瀬・松戸方面<\/td><td>0:48ごろ<\/td><td>JR常磐線下り後の逃げ道になる<\/td><\/tr><\/tbody><\/table><\/div><h3>曜日別の確認<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>東武スカイツリーライン・浅草方面<\/td><td>0:03 浅草行<\/td><td>0:03 浅草行<\/td><\/tr><tr><td>東武スカイツリーライン・伊勢崎方面<\/td><td>0:34 竹ノ塚行<\/td><td>0:34 竹ノ塚行<\/td><\/tr><tr><td>TX・秋葉原方面<\/td><td>0:02 秋葉原行<\/td><td>0:02 秋葉原行<\/td><\/tr><tr><td>TX・つくば方面<\/td><td>0:18 守谷行<\/td><td>0:18 守谷行<\/td><\/tr><tr><td>日比谷線・中目黒方面<\/td><td>0:28 南千住行<\/td><td>0:27 南千住行<\/td><\/tr><tr><td>千代田線・代々木上原方面<\/td><td>0:09 代々木上原行<\/td><td>0:08 霞ケ関行<\/td><\/tr><\/tbody><\/table><\/div>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>千代田線・北綾瀬／常磐線方面<\/td><td>0:48 北千住始発松戸行<\/td><td>0:48 北千住始発松戸行<\/td><\/tr><\/tbody><\/table><\/div><p>東武線は東武公式駅ページから開く時刻表、TXは首都圏新都市鉄道公式駅ページの曜日別時刻表で確認した。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>北千住は複数社局の接続駅であり、駅止まり列車だけでなく、北千住で乗り換えを諦める利用客が重要である。千代田線、日比谷線、東武線、TXの改札別に、終電後の流出先を分けて確認する。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:45～1:05ごろ<\/li><li>特に注目する時間：0:20～0:55ごろ<\/li><li>JR常磐線下りは0:43松戸行、千代田線は0:48ごろまで残る。<\/li><li>JR、メトロ、東武、TXで終電終了の順番が違う。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>北千住駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>地下鉄北改札、JR改札、東武改札、TX改札の流出差<\/li><li>西口ペデストリアンデッキ、東口、仲町方面の滞留<\/li><li>JR常磐線から千代田線・東武線への最終乗り換え<\/li><li>綾瀬・松戸方面へ帰れる人と帰れない人の分岐<\/li><li>タクシー乗り場、深夜バス、徒歩移動の発生<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本・東京メトロ・東武鉄道・首都圏新都市鉄道 北千住駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>JR東日本と東京メトロの公式時刻表を基に整理した。<\/li><li>北千住は事業者ごとに終電時刻が大きく異なるため、1路線だけで調査終了としない。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「北千住駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0571.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0571.html<\/a><\/p><ul><li>東京メトロ「北千住駅 時刻表」<\/li><\/ul><p><a href=\"https://www.tokyometro.jp/station/kita-senju/timetable/index.html\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/kita-senju/timetable/index.html<\/a><\/p><ul><li>東京メトロ「千代田線 北千住駅 印刷用時刻表」<\/li><\/ul>", "<p><a href=\"https://www.tokyometro.jp/station/timetable/pdf/202603/C18.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/timetable/pdf/202603/C18.pdf<\/a><\/p>"]}]}, {"name": "二子玉川駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>二子玉川駅には、東急田園都市線と東急大井町線が乗り入れる。田園都市線は渋谷・押上方面と長津田・中央林間方面、大井町線は大井町方面と溝の口方面を結ぶ。深夜帯は中央林間、長津田、鷺沼など、行き先ごとに到達できる範囲が変わる。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な方面<\/th><th>隣駅<\/th><\/tr><\/thead><tbody><tr><td>田園都市線・渋谷方面<\/td><td>渋谷、半蔵門線、押上方面<\/td><td>用賀<\/td><\/tr><tr><td>田園都市線・中央林間方面<\/td><td>鷺沼、長津田、中央林間方面<\/td><td>二子新地<\/td><\/tr><tr><td>大井町線・大井町方面<\/td><td>自由が丘、大岡山、大井町方面<\/td><td>上野毛<\/td><\/tr><tr><td>大井町線・溝の口方面<\/td><td>二子新地、高津、溝の口方面<\/td><td>二子新地<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span><\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>田園都市線・中央林間方面<\/td><td>0:09<\/td><td>中央林間<\/td><td>各停・中央林間まで行ける最後<\/td><\/tr><tr><td>田園都市線・中央林間方面<\/td><td>0:25<\/td><td>長津田<\/td><td>各停・長津田まで行ける最後<\/td><\/tr><tr><td>田園都市線・中央林間方面<\/td><td>0:40<\/td><td>鷺沼<\/td><td>各停・この方向の最終<\/td><\/tr><tr><td>田園都市線・渋谷方面<\/td><td>0:13<\/td><td>渋谷<\/td><td>各停・この方向の最終< kday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも、深夜の二子玉川止まりとしてこの列車を観察対象にする。<\/p><h3>終着到着時刻<\/h3><div class=\"table-wrap\"><table><thead><tr><th>列車<\/th><th>自由が丘着<\/th><th>上野毛着<\/th><th>二子玉川着<\/th><\/tr><\/thead><tbody><tr><td>大井町線各停・二子玉川行<\/td><td>0:34<\/td><td>0:43<\/td><td>0:46<\/td><\/tr><\/tbody><\/table><\/div><p>東急公式連携時刻表の列車詳細で停車時刻を確認した。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:50～0:55ごろ<\/li><li>特に注目する時間：0:09～0:40ごろ<\/li><li>田園都市線中央林間方面の最終：0:40 鷺沼行<\/li><li>大井町線溝の口方面の最終：<span class=\"day weekday\">平日<\/span>0:35、<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>0:34<\/li><li>中央林間まで行ける最後は<span class=\"day weekday\">平日<\/span>0:09、<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>0:10で異なる。<\/li><li>田園都市線と大井町線の乗り換え可否を、行き先別に確認する。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>二子玉川駅で終電を逃した利用客と、中央林間・長津田・大井町など目的地まで届く列車を逃した利用客が、駅外や別路線へどのように移動するかを把握する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>田園都市線と大井町線の乗り換えに間に合わなかった人<\/li><li>中央林間行、長津田行、鷺沼行の違いを発車案内で確認する人<\/li><li>ライズ側、高島屋側、バス・タクシー乗り場への流出<\/li><li>二子新地、高津に停車する列車と通過する列車の違い<\/li><li>駅前で電話、経路検索、宿泊先検索をする人<\/li><li><span class=\"day weekday\">平日<\/span>と<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>の違い<\/li><\/ul><ul><li>遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：東急電鉄 二子玉川駅<\/li><li>時刻表：東急公式サイトから案内される連携時刻表で確認<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>東急電鉄「二子玉川駅」<\/li><\/ul><p><a href=\"https://www.tokyu.co.jp/area/futako-tamagawa/station/\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyu.co.jp/area/futako-tamagawa/station/<\/a><\/p><ul><li>東急公式連携時刻表「二子玉川駅 田園都市線 中央林間方面」<\/li><\/ul><p><a href=\"https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000789&amp;updown=1\" target=\"_blank\" rel=\"noreferrer\">https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000789&amp;updown=1<\/a><\/p><ul><li>東急公式連携時刻表「二子玉川駅 田園都市線 渋谷方面」<\/li><\/ul>", "<p><a href=\"https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000789&amp;updown=0\" target=\"_blank\" rel=\"noreferrer\">https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000789&amp;updown=0<\/a><\/p><ul><li>東急公式連携時刻表「二子玉川駅 大井町線 溝の口方面」<\/li><\/ul><p><a href=\"https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000787&amp;updown=1\" target=\"_blank\" rel=\"noreferrer\">https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000787&amp;updown=1<\/a><\/p><ul><li>東急公式連携時刻表「二子玉川駅 大井町線 大井町方面」<\/li><\/ul>", "<p><a href=\"https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000787&amp;updown=0\" target=\"_blank\" rel=\"noreferrer\">https://transfer.navitime.biz/tokyu/pc/diagram/TrainDiagram?stCd=00007197&amp;rrCd=00000787&amp;updown=0<\/a><\/p>"]}]}, {"name": "蒲田駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>蒲田駅には、JR京浜東北線、東急池上線、東急多摩川線が乗り入れている。東急2路線は蒲田を起点とするため、深夜帯はJR蒲田と京急蒲田の徒歩移動も含めて観察する。<\/p><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>京浜東北線・南行<\/td><td>川崎、横浜、桜木町方面<\/td><td>川崎<\/td><\/tr><tr><td>京浜東北線・北行<\/td><td>品川、東京、上野方面<\/td><td>大森<\/td><\/tr><tr><td>東急池上線<\/td><td>雪が谷大塚、旗の台、五反田方面<\/td><td>蓮沼<\/td><\/tr><tr><td>東急多摩川線<\/td><td>矢口渡、下丸子、多摩川方面<\/td><td>矢口渡<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>京浜東北線・南行<\/td><td>0:20<\/td><td>桜木町<\/td><td>普通<\/td><\/tr><tr><td>京浜東北線・北行<\/td><td>0:18<\/td><td>上野<\/td><td>普通<\/td><\/tr><tr><td>東急池上線<\/td><td>0:14<\/td><td>五反田<\/td><td>各停<\/td><\/tr><tr><td>東急池上線<\/td><td>0:33<\/td><td>雪が谷大塚<\/td><td>各停<\/td><\/tr><tr><td>東急多摩川線<\/td><td>0:33<\/td><td>多摩川<\/td><td>各停<\/td><\/tr><\/tbody><\/table><\/div>", "<h3>行き先別の実質最終<\/h3><p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>京浜東北線南行<\/td><td>桜木町まで<\/td><td>0:20<\/td><td>横浜方面へ届く最後の確認点<\/td><\/tr><tr><td>京浜東北線北行<\/td><td>上野まで<\/td><td>0:18<\/td><td>品川・東京方面の最後<\/td><\/tr><tr><td>池上線<\/td><td>五反田まで<\/td><td>0:14<\/td><td>0:21以降は雪が谷大塚行<\/td><\/tr><tr><td>池上線<\/td><td>雪が谷大塚まで<\/td><td>0:33<\/td><td>路線終盤の区間行き<\/td><\/tr><tr><td>多摩川線<\/td><td>多摩川まで<\/td><td>0:33<\/td><td>東急多摩川線の終盤<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅に着く最終列車", "pages": ["<p>東急池上線・多摩川線は蒲田が終点であり、深夜帯には東急ホームから西口・東口へまとまった流出が出る。JR側では蒲田止まり・途中駅止まりの列車より、京浜東北線最終後に京急蒲田へ歩く人の動きが重要である。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:50～0:55ごろ<\/li><li>特に注目する時間：0:15～0:40ごろ<\/li><li>JR京浜東北線は0:18～0:20で終盤となり、その後も東急2路線は0:33まで残る。<\/li><li>京急蒲田へ徒歩移動する利用客を東口側で確認する。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>蒲田駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>JR中央改札と東急改札の流出差<\/li><li>東急池上線・多摩川線の終着降車客<\/li><li>京急蒲田方面へ歩く人<\/li><li>西口繁華街、東口バス、タクシー乗り場の動き<\/li><li>駅前で経路検索、電話、宿泊先検索をする人<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本・東急電鉄 蒲田駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>JR東日本と東急公式サイトから案内される時刻表を基に整理した。<\/li><li>蒲田駅と京急蒲田駅は別駅であり、徒歩移動には時間を要する。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「蒲田駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0478.html\" <\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>京王井の頭線・吉祥寺方面<\/td><td>0:30 富士見ヶ丘行<\/td><td>0:30 富士見ヶ丘行<\/td><\/tr><tr><td>田園都市線・中央林間まで<\/td><td>23:52 中央林間行<\/td><td>23:55 中央林間行<\/td><\/tr><tr><td>半蔵門線・押上方面の路線最終<\/td><td>0:12 清澄白河行<\/td><td>0:15 青山一丁目行<\/td><\/tr><tr><td>銀座線・浅草方面<\/td><td>0:02 上野行<\/td><td>0:02 上野行<\/td><\/tr><tr><td>副都心線・池袋方面<\/td><td>0:20 新宿三丁目行<\/td><td>0:20 新宿三丁目行<\/td><\/tr><\/tbody><\/table><\/div>", "<p>井の頭線は京王電鉄渋谷駅公式ページから案内される曜日別時刻表で確認した。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>渋谷駅は複数路線の起終点機能を持つが、深夜調査では駅止まり列車の降車だけでなく、地下鉄・私鉄からJRへ逃げる人、JRから私鉄へ乗り継げない人、出口ごとの流出を分けて見る。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:45～1:10ごろ<\/li><li>特に注目する時間：0:10～0:55ごろ<\/li><li>東急線は0:25ごろまでに行ける範囲が短くなり、JR山手線は0時台後半まで残る。<\/li><li>大規模駅のため、最終列車時刻より出口別の人流が重要である。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>渋谷駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>ハチ公口、宮益坂口、新南改札、道玄坂方面の分散<\/li><li>東急・メトロ地下ホームからJRへ移動する人<\/li><li>東横線元住吉行、田園都市線鷺沼行を目的地別にどう受け止めるか<\/li><li>井の頭線側、道玄坂、タクシー乗り場の滞留<\/li><li>駅前で電話、経路検索、宿泊先検索をする人<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本・東急電鉄・東京メトロ・京王電鉄 渋谷駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>JR東日本、東急、東京メトロの公式時刻表を基に整理した。<\/li><li>渋谷では路線が残っていても目的地に届かない場合が多い。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「渋谷駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0808.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0808.html<\/a><\/p><ul><li>東急電鉄「渋谷駅」<\/li><\/ul><p><a href=\"https://www.tokyu.co.jp/area/shibuya/station/\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyu.co.jp/area/shibuya/station/<\/a><\/p><ul><li>東京メトロ「渋谷駅 時刻表」<\/li><\/ul>", "<p><a href=\"https://www.tokyometro.jp/station/shibuya/timetable/index.html\" target=
