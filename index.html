    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {

    body.locked { overflow: hidden; }
    .lock-screen {

        rgba(5,13,25,.98);
    }
    .lock-screen[hidden] { display: none; }
    .lock-panel {

      background: linear-gradient(145deg, #13243a, #0b192a);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .lock-mark {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      border-radius: 18px;
      color: #061719;
      background: var(--cyan);
      font-size: 28px;
      font-weight: 900;
    }
    .lock-panel h2 { margin: 0 0 8px; font-size: 25px; }
    .lock-panel p { margin: 0 0 20px; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .passcode {
      width: 100%;
      min-height: 50px;
      padding: 0 15px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      outline: 0;
      background: rgba(0,0,0,.18);
      text-align: center;
      letter-spacing: .18em;

    .passcode:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(85,216,208,.1); }
    .unlock {
      width: 100%;
      min-height: 48px;
      margin-top: 10px;
      color: #061719;
      border: 0;
      border-radius: 13px;
      background: var(--cyan);
      font-weight: 900;
      cursor: pointer;

    .eyebrow {

    .count strong { color: var(--text); font-size: 25px; }
    .notice { color: var(--amber); font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 15px; }
    .card {

    .card:hover { transform: translateY(-3px); border-color: rgba(85,216,208,.35); }
    .card::after {

    .time-box { padding: 12px; border: 1px solid var(--line); border-radius: 13px; background: rgba(0,0,0,.12); }

    .actions { display: flex; gap: 8px; margin-top: 15px; }
    .compact-mode .card { min-height: 0; }
    .compact-mode .card .route,

    .details, .report {

</head>

    const AUTH_KEY = "last-train-view-auth";
    const AUTH_HOURS = 24;

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(digest)].map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    function unlockPage() {
      document.querySelector("#lockScreen").hidden = true;
      document.body.classList.remove("locked");
    }

    function initializeLock() {
      document.body.classList.add("locked");
      const authenticatedAt = Number(sessionStorage.getItem(AUTH_KEY) || 0);
      if (Date.now() - authenticatedAt < AUTH_HOURS * 60 * 60 * 1000) unlockPage();
    }

    document.querySelector("#lockForm").addEventListener("submit", async event => {
      event.preventDefault();
      const input = document.querySelector("#passcode");
      const error = document.querySelector("#lockError");
      const hash = await sha256(input.value);
      input.value = "";
      if (hash === PASSCODE_HASH) {
        sessionStorage.setItem(AUTH_KEY, String(Date.now()));
        error.textContent = "";
        unlockPage();
      } else {
        error.textContent = "パスコードが違います";
        input.focus();
      }

 | 平塚 | 普通 |\n| 東海道線・上野東京ライン北行 | 23:39 | 東京 | 普通 |\n| 上野東京ライン・常磐線方面 | 22:56 | 土浦 | 普通 |\n| 山手線・外回り（渋谷・新宿方面） | 0:47 | 大崎 | 普通 |\n| 山手線・内回り（東京・上野方面） | 0:25 | 池袋 | 普通 |\n| 横須賀線・下り | 23:59 | 大船 | 普通 |\n| 横須賀・総武快速線・上り | 23:52 | 千葉 | 普通・総武線内快速 |\n| 京浜東北線・南行 | 0:46 | 蒲田 | 普通 |\n| 京浜東北線・北行 | 0:30 | 上野 | 普通 |\n\n### JR在来線・土曜・休日\n\n| 路線・方向 | 最終出発 | 行き先 | 種別 |\n|---|---:|---|---|\n| 東海道線・下り | 0:04 | 平塚 | 普通 |\n| 東海道線・上野東京ライン北行 | 23:39 | 東京 | 普通 |\n| 上野東京ライン・常磐線方面 | 22:56 | 土浦 | 普通 |\n| 山手線・外回り（渋谷・新宿方面） | 0:43 | 大崎 | 普通 |\n| 山手線・内回り（東京・上野方面） | 0:25 | 池袋 | 普通 |\n| 横須賀線・下り | 23:59 | 大船 | 普通 |\n| 横須賀・総武快速線・上り | 23:52 | 千葉 | 普通・総武線内快速 |\n| 京浜東北線・南行 | 0:46 | 蒲田 | 普通 |\n| 京浜東北線・北行 | 0:30 | 上野 | 普通 |\n\n山手線外回りの最後の列車は大崎止まりである。池袋方面まで移動できる最終は、平日・土曜休日とも0:20品川発となる。\n\n## 4. 東海道新幹線の最終列車\n\n2026年6月11日のJR東海公式発車順序案内で確認した。\n\n| 方向 | 最終出発 | 列車 | 行き先 |\n|---|---:|---|---|\n| 下り | 22:55 | こだま915号 | 三島 |\n| 上り | 23:39 | のぞみ64号 | 東京 |\n\n下りの主な遠距離方面では、新大阪行の最終が21:31、名古屋行の最終が22:10である。その後は静岡行22:19、三島行22:55となる。\n\n新幹線は在来線・京急線より早く終了するため、0時台の駅外流出を直接生む路線ではない。ただし、最終新幹線到着後の在来線・京急線への乗り換え失敗は観察対象となり得る。\n\n## 5. 京急線の最終列車\n\n京急公式の品川駅標準時刻表は、土曜休日が2025年12月13日改正、平日が2025年12月15日改正である。\n\n| 曜日 | 方向 | 最終出発 | 行き先 | 種別 |\n|---|---|---:|---|---|\n| 平日 | 上り・泉岳寺方面 | 0:00 | 泉岳寺 | 普通 |\n| 平日 | 下り・羽田空港、横浜方面 | 0:06 | 京急川崎 | 普通 |\n| 土曜休日 | 上り・泉岳寺方面 | 23:57 | 泉岳寺 | 急行 |\n| 土曜休日 | 下り・羽田空港、横浜方面 | 0:06 | 京急川崎 | 普通 |\n\n空港方面や横浜以遠へ向かう列車は、上表の最終列車より早く終了する。調査時には、単純な「京急線最終」だけでなく、羽田空港・横浜・三浦半島方面の目的地別最終を逃した利用客にも注意する。\n\n## 6. 品川止まりの列車\n\n### 山手線・田町側から\n\n田町駅の山手線外回り公式時刻表から「品川行」を抽出した。田町駅からは高輪ゲートウェイ駅を経由し、品川駅まで通常約4分として到着時刻を見込んだ。\n\n#### 平日・土曜休日共通\n\n| 田町発 | 品川到着見込み |\n|---:|---:|\n| 0:45 | 0:49ごろ |\n| 0:50 | 0:54ごろ |\n| 0:55 | 0:59ごろ |\n\n### 山手線・大崎側から\n\n大崎駅の山手線内回り時刻表では、平日23:45、23:50、23:55に品川行がある。土曜休日も同時刻である。大崎駅から品川駅までは通常約3分のため、到着は23:48、23:53、23:58ごろと見込まれる。\n\n### 京急線・北品川側から\n\n北品川駅の上り公式時刻表では、平日・土曜休日とも0:16発が品川行の最終である。通常の駅間所要時間から、品川駅には0:18ごろ到着すると見込まれる。\n\n北品川駅からの主な品川行は次のとおり。\n\n| 曜日 | 北品川発 |\n|---|---|\n| 平日 | 23:10、23:24、23:35、23:55、0:16 |\n| 土曜休日 | 23:10、23:27、23:39、23:53、0:16 |\n\n京浜東北線については、田町駅の深夜時刻表上に品川行は確認できなかった。0時台の南行列車は蒲田方面まで運転する。\n\n## 7. 乗客が出てくると予想される時間\n\n### 平日の主な観察ポイント\n\n| 時刻 | 路線・状況 | 想定 |\n|---:|---|---|\n| 0:00～0:06 | 京急線の上下最終、東海道線下り最終 | 複数方面の終電利用客が集中 |\n| 0:18ごろ | 京急線の最後の品川止まり | 京急高輪口側へまとまった降車が見込まれる |\n| 0:20～0:30 | 山手線の主要方面最終、京浜東北線北行最終 | JR線の終電を逃す利用客が増える時間帯 |\n| 0:46～0:49ごろ | 京浜東北線南行最終、山手線品川止まり | JR改札付近の人流が重なる可能性 |\n| 0:54ごろ | 山手線品川止まり | 終電後の降車客に注目 |\n| 0:59ごろ | 最後の山手線品川止まり | 駅外への流出は1:05～1:10ごろまで続く可能性 |\n\n### 土曜・休日の主な観察ポイント\n\n- 23:57～0:06：京急線の上下最終と東海道線下り最終\n- 0:18ごろ：京急線の最後の品川止まり\n- 0:20～0:30：山手線・京浜東北線の主要な最終列車\n- 0:43～0:49ごろ：山手線外回り最終と品川止まり到着\n- 0:54、0:59ごろ：最後の山手線品川止まり\n\n## 8. 駅・路線の概要\n\n品川駅には、JR東日本の東海道線、上野東京ライン、常磐線直通、山手線、横須賀線、京浜東北線、成田エクスプレス、JR東海の東海道新幹線、京浜急行電鉄の京急本線が乗り入れている。\n\n| 路線・方向 | 主な行き先 | 品川駅の次の停車駅 |\n|---|---|---|\n| 東海道線・下り | 川崎、横浜、小田原、熱海方面 | 川崎駅 |\n| 東海道線・上野東京ライン北行 | 東京、上野、大宮、高崎・宇都宮方面 | 新橋駅 |\n| 常磐線直通 | 上野、柏、取手、土浦方面 | 新橋駅 |\n| 山手線・外回り | 大崎、渋谷、新宿方面 | 大崎駅 |\n| 山手線・内回り | 東京、上野、池袋方面 | 高輪ゲートウェイ駅 |\n| 横須賀線・下り | 武蔵小杉、横浜、鎌倉、久里浜方面 | 西大井駅 |\n| 横須賀・総武快速線・上り | 東京、錦糸町、千葉方面 | 新橋駅 |\n| 京浜東北線・南行 | 大井町、蒲田、横浜、大船方面 | 大井町駅 |\n| 京浜東北線・北行 | 東京、上野、大宮方面 | 高輪ゲートウェイ駅 |\n| 東海道新幹線・下り | 新横浜、名古屋、新大阪方面 | 新横浜駅 |\n| 東海道新幹線・上り | 東京方面 | 東京駅 |\n| 京急本線・下り | 羽田空港、横浜、横須賀、三崎口方面 | 北品川駅 |\n| 京急本線・上り | 泉岳寺、都営浅草線、京成線方面 | 泉岳寺駅 |\n\n## 9. 現地調査時の確認項目\n\n- JR高輪口・港南口・京急高輪口での人流の違い\n- 山手線品川止まり到着後、利用客が改札へ出るまでの時間\n- 京急線品川止まりの降車客がJRへ向かうか、駅外へ出るか\n- 0:18、0:49、0:54、0:59ごろの降車人数\n- 終電後に高輪口と港南口のどちらへ移動する人が多いか\n- タクシー乗り場、送迎車、ホテル方面へ向かう人の動き\n- 羽田空港方面の列車を逃した利用客の行動\n- 新幹線から在来線・京急線への最終乗り換え状況\n- 駅前で電話、経路検索、宿泊先検索をする人\n- 平日と土曜休日の京急上り最終時刻の違い\n- 列車の遅延、運休、臨時列車の有無\n\n## 10. 注意事項\n\n- 本資料は2026年6月11日に閲覧した公式時刻表を基にしている。\n- JR東日本の時刻表は「JR時刻表」2026年6月号に基づく表示である。\n- 東海道新幹線は調査日のJR東海公式発車順序案内で確認した。臨時列車の運転日により最終列車の列車番号などが変わる可能性がある。\n- 山手線と京急線の品川到着時刻は、隣駅の公式発車時刻から算出した見込みである。\n- 京急線は目的地により実質的な最終列車が大きく異なる。\n- 臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。\n- 調査当日に各社公式サイト、駅掲示、発車案内で再確認する。\n\n## 11. 出典\n\n- JR東日本「品川駅 時刻表」  \n  https://timetables.jreast.co.jp/timetable/list0788.html\n いる。このため、りんかい線全体の最終は0:18となる。\n\n## 4. 山手線の大崎止まり\n\n大崎駅の出発時刻表だけでは、大崎に到着して運転を終了する列車を確認できない。このため、外回りは品川駅、内回りは五反田駅の公式時刻表から「大崎行」を抽出した。\n\n到着時刻は、隣駅の公式発車時刻に通常の駅間所要時間を加えた見込みである。品川駅から大崎駅は約3分、五反田駅から大崎駅は約2分としている。\n\n### 平日・外回り（品川側から）\n\n| 品川発 | 大崎到着見込み |\n|---:|---:|\n| 0:26 | 0:29ごろ |\n| 0:33 | 0:36ごろ |\n| 0:37 | 0:40ごろ |\n| 0:42 | 0:45ごろ |\n| 0:47 | 0:50ごろ |\n\nこのほか、0:03および0:16品川発の大崎行がある。\n\n### 平日・内回り（五反田側から）\n\n| 五反田発 | 大崎到着見込み |\n|---:|---:|\n| 0:28 | 0:30ごろ |\n| 0:35 | 0:37ごろ |\n| 0:41 | 0:43ごろ |\n| 0:47 | 0:49ごろ |\n| 0:55 | 0:57ごろ |\n\nこのほか、0:14五反田発の大崎行がある。\n\n### 土曜・休日・外回り（品川側から）\n\n| 品川発 | 大崎到着見込み |\n|---:|---:|\n| 0:26 | 0:29ごろ |\n| 0:31 | 0:34ごろ |\n| 0:38 | 0:41ごろ |\n| 0:43 | 0:46ごろ |\n\nこのほか、0:04品川発の大崎行がある。\n\n### 土曜・休日・内回り（五反田側から）\n\n| 五反田発 | 大崎到着見込み |\n|---:|---:|\n| 0:28 | 0:30ごろ |\n| 0:35 | 0:37ごろ |\n| 0:47 | 0:49ごろ |\n| 0:55 | 0:57ごろ |\n\nこのほか、0:14五反田発の大崎行がある。\n\n## 5. 乗客が出てくると予想される時間\n\n### 平日の主な観察ポイント\n\n| 時刻 | 路線・状況 | 想定 |\n|---:|---|---|\n| 0:18 | りんかい線の最終が出発 | 新木場方面へ向かう最後の利用客が集中する可能性 |\n| 0:22～0:24 | 山手線の両方向最終が出発 | 大崎駅から山手線で移動できなくなる境目 |\n| 0:29～0:30ごろ | 両方向から大崎止まり | 最初のまとまった降車が重なる可能性 |\n| 0:36～0:37ごろ | 両方向から大崎止まり | 短い間隔で降車客が駅外へ流出 |\n| 0:40～0:50ごろ | 大崎止まりが連続 | 平日の中心的な観察時間帯 |\n| 0:57ごろ | 五反田側から最後の大崎止まり | 駅外への流出は1:00～1:05ごろまで続く可能性 |\n\n### 土曜・休日の主な観察ポイント\n\n- 0:18：りんかい線の最終が出発\n- 0:22～0:24：山手線の両方向最終が出発\n- 0:29～0:30ごろ：両方向から大崎止まり\n- 0:34～0:37ごろ：大崎止まりが連続\n- 0:41～0:49ごろ：両方向から大崎止まり\n- 0:57ごろ：五反田側から最後の大崎止まり\n\n## 6. 駅・路線の概要\n\n大崎駅には、JR東日本の山手線、埼京線、湘南新宿ライン、相鉄線直通列車と、東京臨海高速鉄道のりんかい線が乗り入れている。相鉄線直通は運行系統として分けると、合計5系統となる。\n\n| 路線・方向 | 主な行き先 | 大崎駅の次の停車駅 |\n|---|---|---|\n| 山手線・内回り | 品川、東京、上野方面 | 品川駅 |\n| 山手線・外回り | 渋谷、新宿、池袋方面 | 五反田駅 |\n| 埼京線・北行 | 新宿、赤羽、大宮、川越方面 | 恵比寿駅 |\n| 湘南新宿ライン・北行 | 新宿、大宮、高崎・宇都宮方面 | 恵比寿駅または渋谷駅（列車種別による） |\n| 湘南新宿ライン・南行 | 横浜、大船、小田原、逗子方面 | 西大井駅または武蔵小杉駅（列車による） |\n| 相鉄線直通・南行 | 羽沢横浜国大、二俣川、海老名方面 | 西大井駅 |\n| りんかい線・新木場方面 | 大井町、東京テレポート、国際展示場、新木場方面 | 大井町駅 |\n\n## 7. 現地調査時の確認項目\n\n- 山手線大崎止まりの到着ホームと、利用客が向かう改札\n- 北改札口と南改札口への人流の違い\n- 大崎止まり到着後、改札から出てくるまでの所要時間\n- 改札外へ出る人と、構内で待機・移動する人の割合\n- 0:29～0:37、0:40～0:50、0:57ごろの人数の集中\n- JR線とりんかい線の乗り換えを試みる利用客の動き\n- タクシー、送迎車、徒歩、シェアサイクルなどへの移動\n- 駅前で電話、経路検索、宿泊先検索をする人\n- 平日と土曜休日の大崎止まり本数の違い\n- 列車の遅延、運休、臨時列車の有無\n\n## 8. 調査上の注意\n\n- 本資料は2026年6月11日に閲覧した公式時刻表を基にしている。\n- JR東日本の時刻表は「JR時刻表」2026年6月号に基づく表示である。\n- りんかい線公式時刻表の改正日は2026年3月14日である。\n- 山手線大崎止まりの到着時刻は、隣駅の公式発車時刻から算出した見込みであり、公式の到着時刻そのものではない。\n- 「24時」は翌日の0時として表記した。\n- 臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。\n- 調査当日に各社公式サイト、駅掲示、発車案内で再確認する。\n\n## 9. 出典\n\n- JR東日本「大崎駅 時刻表」  \n  https://timetables.jreast.co.jp/timetable/list0319.html\n- JR東日本「大崎駅 山手線 外回り・平日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0319/0319040.html\n- JR東日本「大崎駅 山手線 外回り・土曜休日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0319/0319041.html\n- JR東日本「大崎駅 山手線 内回り・平日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0319/0319050.html\n- JR東日本「大崎駅 山手線 内回り・土曜休日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0319/0319051.html\n- JR東日本「品川駅 山手線 外回り・平日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0788/0788050.html\n- JR東日本「品川駅 山手線 外回り・土曜休日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0788/0788051.html\n- JR東日本「五反田駅 山手線 内回り・平日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0695/0695020.html\n- JR東日本「五反田駅 山手線 内回り・土曜休日」  \n  https://timetables.jreast.co.jp/2606/timetable/tt0695/0695021.html\n- 東京臨海高速鉄道「大崎駅 標準時刻表」  \n  https://www.twr.co.jp/route/tabid/121/Default.aspx\n","新橋駅終電調査レポート_20260612.md":"# 新橋駅 終電調査レポート\n\n調査日：2026年6月12日  \n対象駅：JR東日本・東京メトロ・東京都交通局・ゆりかもめ 新橋駅  \n時刻表：各鉄道事業者の公式サイトで確認\n\n## 1. 調査目的\n\n新橋駅で終電を逃した利用客が駅外へ出てくる時間帯を把握するため、JR各線、銀座線、都営浅草線、ゆりかもめの最終列車を整理する。\n\n## 2. 調査時間帯の目安\n\n- 調査推奨時間：23:55～1:00ごろ\n- 特に注目する時間：0:10～0:55ごろ\n- 新橋止まりの定期列車：深夜帯には確認できず\n\n0:09～0:23に地下鉄・ゆりかもめの最終が集中し、その後0:34～0:50にJRの最終が続く。最後は山手線外回り0:50発の品川行であるため、改札通過時間を含めて1:00ごろまでの観察が適当と考えられる。\n\n## 3. 新橋駅から出発する最終列車\n\n### JR東日本\n\n| 路線・方向 | 平日 | 土曜・休日 | 行き先 |\n|---|---:|---:|---|\n| 東海道線・下り | 23:57 | 23:57 | 平塚 |\n| 上野東京ライン・北行 | 23:43 | 23:43 | 東京 |\n| 常磐線直通・北行 | 23:01 | 23:01 | 土浦 |\n| 山手線・外回り（品川方面） | 0:50 | 0:50 | 品川 |\n| 山手線・内回り（東京・上野方面） | 0:34 | 0:34 | 池袋 |\n| 横須賀線・下り | 23:53 | 23:53 | 大船 |\n| 横須賀・総武快速線・上り | 23:57 | 23:57 | 千葉 |\n| 京浜東北線・南行 | 0:36 | 0:36 | 蒲田 |\n| 京浜東北線・北行 | 0:39 | 0:39 | 上野 |\n\n### 地下鉄・ゆりかもめ\n\n| 路線・方向 | 最終出発 | 行き先 |\n|---|---:|---|\n| 東京メトロ銀座線・渋谷方面 | 0:14 | 渋谷 |\n| 東京メトロ銀座線・浅草方面 | 0:16 | 上野 |\n| 都営浅草線・西馬込、泉岳寺方面 | 0:23 | 泉岳寺 |\n| 都営浅草線・押上方面 | 0:09 | 京成高砂 |\n| ゆりかもめ・豊洲方面 | 0:20 | 有明 |\n\n都営浅草線は平日・土休日とも同時刻である。ゆりかもめの豊洲行最終は23:50で、その後の0:20発は有明行となる。\n\n## 4. 新橋止まりの列車\n\n通常の深夜ダイヤでは、新橋を終点とする定期列車は確認できなかった。新橋では「駅止まり列車からのまとまった降車」よりも、各方面の最終列車を逃した利用客、乗り換えに失敗した利用客、山手線品川行など途中駅止まりの列車に乗れなかった利用客が主な観察対象になる。\n\n## 5. 乗客が出てくると予想される時間\n\n| 時刻 | 状況 |\n|---:|---|\n| 23:50～0:00 | ゆりかもめ豊洲行、JR郊外方面の最終が終了 |\n| 0:09～0:23 | 浅草線、銀座線、ゆりかもめの最終が集中 |\n| 0:34～0:39 | 山手線内回り、京浜東北線の最終 |\n| 0:50前後 | 山手線外回り最終。JR駅外への最後の流出に注目 |\n| 0:50～1:00 | 最終列車後の経路検索、タクシー・繁華街方面への移動 |\n\n## 6. 駅・路線の概要\n\n| 路線・方向 | 主な行き先 | 次の駅 |\n|---|---|---|\n| 東海道線・下り | 品川、横浜、小田原方面 | 品川 |\n| 上野東京ライン・北行 | 東京、上野方面 | 東京 |\n| 山手線・外回り | 品川、渋谷方面 | 浜松町 |\n| 山手線・内回り | 東京、上野方面 | 有楽町 |\n| 横須賀線・下り | 品川、横浜方面 | 品川 |\n| 横須賀・総武快速線・上り | 東京、千葉方面 | 東京 |\n| 京浜東北線・南行 | 品川、蒲田方面 | 浜松町 |\n| 京浜東北線・北行 | 東京、上野方面 | 有楽町 |\n| 銀座線・渋谷方面 | 虎ノ門、渋谷方面 | 虎ノ門 |\n| 銀座線・浅草方面 | 銀座、上野、浅草方面 | 銀座 |\n| 都営浅草線・南行 | 大門、泉岳寺方面 | 大門 |\n| 都営浅草線・北行 | 東銀座、浅草、押上方面 | 東銀座 |\n| ゆりかもめ | 台場、有明、豊洲方面 | 汐留 |\n\n## 7. 現地調査時の確認項目\n\n- JRの銀座口・日比谷口・烏森口・汐留口での人流の違い\n- 地下鉄、ゆりかもめからJRへの最終乗り換え状況\n- 0:14～0:23と0:34～0:50の二つのピーク\n- タクシー乗り場、銀座・汐留・新橋繁華街方面への移動\n- 駅前で電話、経路検索、宿泊先検索をする人\n- 列車の遅延、運休、臨時列車の有無\n\n## 8. 注意事項\n\n- 本資料は2026年6月12日に閲覧した公式時刻表を基にしている。\n- JR東日本の表示は「JR時刻表」2026年6月号に基づく。\n- 目的地別の実質的な最終列車は、表の路線最終より早い場合がある。\n- 臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。\n- 調査当日に各社公式サイト、駅掲示、発車案内で再確認する。\n\n## 9. 出典\n\n- JR東日本「新橋駅 時刻表」  \n  https://timetables.jreast.co.jp/timetable/list0877.html\n- 東京メトロ「新橋駅 時刻表」  \n  https://www.tokyometro.jp/station/shimbashi/timetable/index.html\n- 東京都交通局「新橋駅 時刻表」  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/asakusa/A10SD.html\n- ゆりかもめ「新橋駅 時刻表」  \n  https://www.yurikamome.co.jp/station-timetable/u-01.html\n\n","桜上水駅終電調査レポート_20260611.md":"# 桜上水駅 終電調査レポート\n\n調査日：2026年6月11日  \n対象駅：京王線 桜上水駅（KO08）  \n時刻表：京王電鉄公式サイト掲載「2025年3月15日改正」\n\n## 1. 調査目的\n\n桜上水駅で終電を逃した利用客や、桜上水止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、最終列車と当駅止まり列車を整理する。\n\n## 2. 調査時間帯の目安\n\n### 平日\n\n- 調査推奨時間：23:45～1:05ごろ\n- 特に注目する時間：0:20～1:00ごろ\n- 桜上水止まりの最終到着見込み：0:54ごろ\n- 降車、ホームから改札への移動、待ち合わせなどを考慮すると、1:00～1:05ごろまで駅から人が出てくる可能性がある。\n\n### 土曜・休日\n\n- 調査推奨時間：23:35～1:05ごろ\n- 特に注目する時間：0:20～1:00ごろ\n- 桜上水止まりの最終到着見込み：0:54ごろ\n\n## 3. 桜上水駅から出発する最終列車\n\n平日・土曜休日とも、公式時刻表上の最終出発時刻は同じ。\n\n| 方向 | 最終出発 | 行き先 | 種別 |\n|---|---:|---|---|\n| 上り | 0:16 | 新線新宿 | 各駅停車 |\n| 下り | 0:31 | 若葉台 | 各駅停車 |\n\n### 終電を逃す可能性が高まる時間\n\n- 新宿方面は0:16発以降、営業列車がない。\n- 京王八王子・橋本・高尾山口方面は0:31発以降、営業列車がない。\n- 0:31以降に桜上水駅へ到着する当駅止まり列車の利用客は、桜上水から先へ電車で移動できない。\n\n## 4. 桜上水止まりの到着列車\n\n桜上水止まりは、下高井戸側（新宿側）と上北沢側（八王子側）の両方向から設定されている。\n\n到着時刻は、京王電鉄公式時刻表に掲載された隣駅の発車時刻に、通常の駅間所要時間約2分を加えた見込み時刻である。公式時刻表に桜上水の到着時刻そのものは掲載されていないため、現地では数分の余裕を持って確認する。\n\n### 下高井戸側から到着する列車\n\n平日・土曜休日共通。\n\n| 始発駅・始発時刻 | 下高井戸発 | 桜上水到着見込み |\n|---|---:|---:|\n| 京王線新宿 0:14発 | 0:23 | 0:25ごろ |\n| 新線新宿 0:27発 | 0:38 | 0:40ごろ |\n| 新線新宿 0:41発 | 0:52 | 0:54ごろ |\n\n### 上北沢側から到着する列車・平日\n\n| 上北沢発 | 桜上水到着見込み |\n|---:|---:|\n| 23:48 | 23:50ごろ |\n| 0:24 | 0:26ごろ |\n| 0:35 | 0:37ごろ |\n\n### 上北沢側から到着する列車・土曜休日\n\n| 上北沢発 | 桜上水到着見込み |\n|---:|---:|\n| 23:38 | 23:40ごろ |\n| 0:04 | 0:06ごろ |\n| 0:24 | 0:26ごろ |\n| 0:35 | 0:37ごろ |\n\n## 5. 乗客が出てくると予想される時間\n\n### 平日の主な観察ポイント\n\n| 到着見込み | 到着方向 | 想定 |\n|---:|---|---|\n| 23:50ごろ | 上北沢側 | 当駅止まりの降車客 |\n| 0:25～0:26ごろ | 両方向 | 当駅止まりが近接して到着 |\n| 0:37～0:40ごろ | 両方向 | 下り最終0:31発後のため、終電後の降車客に注目 |\n| 0:54ごろ | 下高井戸側 | 最後の当駅止まり。駅外への流出は1:00前後まで続く可能性 |\n\n### 土曜・休日の主な観察ポイント\n\n- 23:40ごろ\n- 0:06ごろ\n- 0:25～0:26ごろ\n- 0:37～0:40ごろ\n- 0:54ごろ\n\n## 6. 駅・路線の概要\n\n桜上水駅には京王線が乗り入れている。公式駅ページでは、急行、区間急行、快速、各駅停車の停車駅とされている。\n\n| 方向 | 主な行き先 | 次の駅 |\n|---|---|---|\n| 上り | 明大前、笹塚、新宿、新線新宿、都営新宿線方面 | 下高井戸駅 |\n| 下り | 調布、橋本、京王八王子、高尾山口方面 | 上北沢駅 |\n\n## 7. 現地調査時の確認項目\n\n- 桜上水止まり到着後、改札から出てくる人数\n- 0:31の下り最終出発後に駅から出てくる人数\n- タクシー、送迎車、徒歩、自転車などへの移動\n- 駅前で待機する人、電話をする人、経路を検索する人\n- 新宿側からの到着客と八王子側からの到着客の違い\n- 列車の遅延、運休、臨時列車の有無\n\n## 8. 注意事項\n\n- 本資料は2026年6月11日に閲覧した京王電鉄公式情報を基にしている。\n- 公式サイト上の掲載時刻表は「2025年3月15日改正」と表示されている。\n- 臨時ダイヤ、年末年始、競馬開催日、工事、事故、天候などにより変更される場合がある。\n- 到着見込みは隣駅の公式発車時刻から算出した推定値であり、実際の到着時刻は現地表示で確認する。\n- 調査当日に京王電鉄公式サイトと駅掲示で再確認する。\n\n## 9. 出典\n\n- 京王電鉄「桜上水駅」  \n  https://www.keio.co.jp/train/station/ko08_sakurajosui/\n- 京王電鉄「桜上水 時刻表」  \n  https://transfer-train.navitime.biz/keio/directions/timetable?station=2890&line=1&direction=0\n- 京王電鉄「新宿 時刻表（京王線・京王新線）」  \n  https://transfer-train.navitime.biz/keio/directions/timetable?station=4254&line=1&direction=1  \n  https://transfer-train.navitime.biz/keio/directions/timetable?station=4254&line=2&direction=0\n- 京王電鉄「下高井戸 時刻表」  \n  https://transfer-train.navitime.biz/keio/directions/timetable?station=922&line=1&direction=1\n- 京王電鉄「上北沢 時刻表」  \n  https://transfer-train.navitime.biz/keio/directions/timetable?station=4052&line=1&direction=0\n","池袋駅終電調査レポート_20260612.md":"# 池袋駅 終電調査レポート\n\n調査日：2026年6月12日  \n対象駅：JR東日本・東武鉄道・西武鉄道・東京メトロ 池袋駅  \n時刻表：各鉄道事業者の公式サイトで確認\n\n## 1. 調査目的\n\n池袋駅で終電を逃した利用客と、池袋止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、JR、東武東上線、西武池袋線、丸ノ内線、有楽町線、副都心線の深夜ダイヤを整理する。\n\n## 2. 調査時間帯の目安\n\n- 調査推奨時間：0:00～1:15ごろ\n- 特に注目する時間：0:15～1:10ごろ\n- 山手線池袋止まりの最終到着見込み：1:02ごろ\n\n私鉄・地下鉄・JRの最終が0:10～0:45ごろまで続き、その後も山手線池袋止まりが到着する。駅が大きく改札から出口まで時間がかかるため、1:10～1:15ごろまで観察するのが適当と考えられる。\n\n## 3. 池袋駅から出発する最終列車\n\n### JR東日本\n\n| 路線・方向 | 平日 | 土曜・休日 | 行き先 |\n|---|---:|---:|---|\n| 埼京線・北行 | 0:22 | 0:22 | 赤羽 |\n| 埼京線・南行 | 23:58 | 23:58 | 新宿 |\n| 湘南新宿ライン・北行 | 23:40 | 23:40 | 籠原 |\n| 湘南新宿ライン・南行 | 22:52 | 22:52 | 国府津 |\n| 山手線・外回り（上野・東京方面） | 0:21 | 0:21 | 品川 |\n| 山手線・内回り（新宿・渋谷方面） | 0:31 | 0:31 | 大崎 |\n\n### 東京メトロ\n\n| 路線・方向 | 平日 | 土曜・休日 | 行き先 |\n|---|---:|---:|---|\n| 丸ノ内線・荻窪方面 | 0:20 | 0:20 | 茗荷谷 |\n| 有楽町線・新木場方面 | 23:59 | 23:59 | 新木場 |\n| 有楽町線・和光市方面 | 0:13 | 0:13 | 和光市方面 |\n| 副都心線・渋谷方面 | 0:14 | 0:14 | 渋谷 |\n| 副都心線・和光市方面 | 0:11 | 0:11 | 和光市・西武線方面 |\n\n丸ノ内線は池袋始発で、最終は茗荷谷行である。有楽町線・副都心線の北行は和光市から東武東上線、小竹向原から西武線へ直通する列車を含むため、列車ごとに行き先を確認する必要がある。\n\n### 西武池袋線\n\n| 曜日 | 最終出発 | 行き先 | 種別 |\n|---|---:|---|---|\n| 平日 | 0:18 | 保谷 | 各駅停車 |\n| 土曜・休日 | 0:18 | 保谷 | 各駅停車 |\n\n小手指方面の最終は0:14発準急小手指行である。路線全体の最終0:18発は保谷までの運転となる。\n\n### 東武東上線\n\n東武公式駅ページの時刻表検索は動的表示であり、今回の保存用本文では深夜欄を確実に抽出できなかった。池袋発の最終時刻・行き先は、現地調査当日に東武公式検索または駅発車案内で必ず再確認する。ほかの路線より終電が遅い場合があるため、観察終了時刻の判断では東武側改札の動きを個別に見る。\n\n## 4. 池袋止まりの列車\n\n池袋は山手線の車庫入庫列車が終着となる主要駅である。上野駅の山手線内回り時刻表では、深夜に0:20、0:27、0:36、平日0:46・土休日0:47発の池袋行が確認できる。\n\n上野から池袋までは通常約16分のため、最後の池袋止まり到着は次のように見込まれる。\n\n| 曜日 | 上野発 | 池袋到着見込み |\n|---|---:|---:|\n| 平日 | 0:46 | 1:02ごろ |\n| 土曜・休日 | 0:47 | 1:03ごろ |\n\n東武東上線、西武池袋線、丸ノ内線も池袋が起終点であり、上り最終列車は池袋止まりとなる。ただし到着時刻は各線・各方面で異なるため、調査当日は各社の到着案内も確認する。\n\n## 5. 乗客が出てくると予想される時間\n\n| 時刻 | 状況 |\n|---:|---|\n| 0:11～0:22 | 地下鉄、西武、丸ノ内線、JR北行の最終が集中 |\n| 0:21～0:31 | 山手線両方向の最終。乗り換え失敗が増える時間帯 |\n| 0:30～0:50 | 私鉄側の終電利用客と池袋止まり到着客に注目 |\n| 1:02～1:03ごろ | 最後の山手線池袋止まり到着見込み |\n| 1:03～1:15 | 大規模駅内の移動後、各出口へ出る人流 |\n\n## 6. 駅・路線の概要\n\n| 路線・方向 | 主な行き先 | 次の駅 |\n|---|---|---|\n| 山手線・外回り | 上野、東京、品川方面 | 大塚 |\n| 山手線・内回り | 新宿、渋谷方面 | 目白 |\n| 埼京線・北行 | 赤羽、大宮、川越方面 | 板橋 |\n| 埼京線・南行 | 新宿、大崎、りんかい線方面 | 新宿 |\n| 湘南新宿ライン・北行 | 大宮、高崎・宇都宮方面 | 赤羽 |\n| 湘南新宿ライン・南行 | 横浜、大船、小田原・逗子方面 | 新宿 |\n| 東武東上線 | 成増、志木、川越、小川町方面 | 北池袋 |\n| 西武池袋線 | 練馬、所沢、飯能方面 | 椎名町 |\n| 丸ノ内線 | 後楽園、東京、新宿、荻窪方面 | 新大塚 |\n| 有楽町線・新木場方面 | 有楽町、豊洲、新木場方面 | 東池袋 |\n| 有楽町線・和光市方面 | 小竹向原、和光市方面 | 要町 |\n| 副都心線・渋谷方面 | 新宿三丁目、渋谷、横浜方面 | 雑司が谷 |\n| 副都心線・和光市方面 | 小竹向原、和光市方面 | 要町 |\n\n## 7. 現地調査時の確認項目\n\n- JR中央改札、東武、西武、メトロ各改札での人流の違い\n- 東口、西口、北口、南口への分散\n- 0:11～0:31の乗り換え客の動き\n- 山手線池袋止まりから各出口へ出るまでの所要時間\n- 1:02～1:03ごろの最後の山手線到着後の降車人数\n- タクシー、深夜バス、繁華街、宿泊施設方面への移動\n- 東武東上線の当日最終発車時刻と上り最終到着時刻\n- 列車の遅延、運休、臨時列車の有無\n\n## 8. 注意事項\n\n- 本資料は2026年6月12日に閲覧した公式時刻表を基にしている。\n- JR東日本の表示は「JR時刻表」2026年6月号に基づく。\n- 東京メトロは2026年3月版公式PDF、西武池袋線は公式時刻表で確認した。\n- 東武東上線は公式の動的検索画面で当日再確認する。\n- 池袋到着時刻は上野駅の公式発車時刻から算出した見込みである。\n- 臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。\n\n## 9. 出典\n\n- JR東日本「池袋駅 時刻表」  \n  https://timetables.jreast.co.jp/timetable/list0108.html\n- JR東日本「上野駅 時刻表」  \n  https://timetables.jreast.co.jp/timetable/list0204.html\n- 東京メトロ「池袋駅 時刻表」  \n  https://www.tokyometro.jp/station/ikebukuro/timetable/index.html\n- 西武鉄道「池袋駅」  \n  https://www.seiburailway.jp/railway/station/ikebukuro/\n- 東武鉄道「池袋駅」  \n  https://www.tobu.co.jp/railway/guide/station/info/7105/\n\n","清澄白河駅終電調査レポート_20260611.md":"# 清澄白河駅 終電調査レポート\n\n調査日：2026年6月11日  \n対象駅：東京メトロ半蔵門線 清澄白河駅（Z11）、都営大江戸線 清澄白河駅（E14）  \n時刻表：各鉄道事業者の公式サイトで2026年6月11日に確認\n\n## 1. 調査目的\n\n清澄白河駅で終電を逃した利用客や、清澄白河止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、2路線の最終列車と当駅止まり列車を整理する。\n\n## 2. 調査時間帯の目安\n\n### 平日\n\n- 調査推奨時間：0:10～1:05ごろ\n- 特に注目する時間：0:25～1:00ごろ\n- 最後の清澄白河止まり到着見込み：0:54ごろ（都営大江戸線）\n\n### 土曜・休日\n\n- 調査推奨時間：23:50～1:05ごろ\n- 特に注目する時間：0:05～1:00ごろ\n- 最後の清澄白河止まり到着見込み：0:54ごろ（都営大江戸線）\n\n半蔵門線は平日と土曜休日で終電時刻の差が大きい。一方、大江戸線は曜日を問わず0:50台まで清澄白河止まりが到着するため、駅全体の調査終了は1:05ごろが目安となる。\n\n## 3. 清澄白河駅から出発する最終列車\n\n### 東京メトロ半蔵門線・平日\n\n| 方向 | 最終出発 | 行き先 | 種別 |\n|---|---:|---|---|\n| 渋谷方面 | 0:25 | 水天宮前 | 各駅停車 |\n| 押上方面 | 0:31 | 押上〈スカイツリー前〉 | 各駅停車 |\n\n### 東京メトロ半蔵門線・土曜休日\n\n| 方向 | 最終出発 | 行き先 | 種別 |\n|---|---:|---|---|\n| 渋谷方面 | 0:00 | 鷺沼 | 各駅停車 |\n| 押上方面 | 0:04 | 北越谷 | 準急 |\n\n### 都営大江戸線・平日\n\n| 方向 | 最終出発 | 行き先 |\n|---|---:|---|\n| 大門・六本木方面 | 0:16 | 大門・六本木経由 都庁前 |\n| 両国・春日方面 | 0:05 | 新御徒町 |\n\n### 都営大江戸線・土曜休日\n\n| 方向 | 最終出発 | 行き先 |\n|---|---:|---|\n| 大門・六本木方面 | 0:16 | 大門・六本木経由 都庁前 |\n| 両国・春日方面 | 0:05 | 新御徒町 |\n\n## 4. 半蔵門線の清澄白河止まり\n\n深夜の清澄白河止まりは、水天宮前側から到着する。住吉側から清澄白河止まりとなる深夜列車は公式時刻表上で確認できなかった。\n\n### 平日\n\n| 水天宮前発 | 清澄白河到着 |\n|---:|---:|\n| 23:49 | 23:52 |\n| 0:33 | 0:36 |\n\n0:33水天宮前発の列車は、東京メトロ公式の列車別時刻で清澄白河0:36着と確認した。\n\n### 土曜休日\n\n| 水天宮前発 | 清澄白河到着見込み |\n|---:|---:|\n| 22:17 | 22:20ごろ |\n| 0:14 | 0:17ごろ |\n\n土曜休日の到着時刻は、水天宮前の公式発車時刻に通常の駅間所要時間約3分を加えた見込み。\n\n## 5. 大江戸線の清澄白河止まり\n\n大江戸線は、門前仲町側と森下側の両方向から複数の清澄白河止まりが到着する。以下は0時台の列車を整理したもの。\n\n到着時刻は、隣駅の公式発車時刻に通常の駅間所要時間約2分を加えた見込み。\n\n### 平日・門前仲町側から\n\n| 門前仲町発 | 清澄白河到着見込み |\n|---:|---:|\n| 0:15 | 0:17ごろ |\n| 0:30 | 0:32ごろ |\n| 0:42 | 0:44ごろ |\n\n### 平日・森下側から\n\n| 森下発 | 清澄白河到着見込み |\n|---:|---:|\n| 0:28 | 0:30ごろ |\n| 0:40 | 0:42ごろ |\n| 0:52 | 0:54ごろ |\n\n### 土曜休日・門前仲町側から\n\n| 門前仲町発 | 清澄白河到着見込み |\n|---:|---:|\n| 0:15 | 0:17ごろ |\n| 0:29 | 0:31ごろ |\n| 0:41 | 0:43ごろ |\n\n### 土曜休日・森下側から\n\n| 森下発 | 清澄白河到着見込み |\n|---:|---:|\n| 0:27 | 0:29ごろ |\n| 0:39 | 0:41ごろ |\n| 0:52 | 0:54ごろ |\n\n## 6. 乗客が出てくると予想される時間\n\n### 平日の主な観察ポイント\n\n| 時刻 | 路線・状況 | 想定 |\n|---:|---|---|\n| 0:05～0:16 | 大江戸線の各方向最終が出発 | 大江戸線を乗り過ごせない時間帯に入る |\n| 0:17ごろ | 大江戸線・門前仲町側から当駅止まり | 降車客が駅外または半蔵門線へ移動 |\n| 0:25～0:32ごろ | 半蔵門線終電と大江戸線当駅止まりが集中 | 乗換客と終電後の降車客が重なる可能性 |\n| 0:36 | 半蔵門線の最後の当駅止まり | 半蔵門線からまとまった降車が見込まれる |\n| 0:42～0:44ごろ | 大江戸線の両方向から当駅止まり | 終電後の降車客に注目 |\n| 0:54ごろ | 大江戸線・森下側から最後の当駅止まり | 駅外への流出は1:00前後まで続く可能性 |\n\n### 土曜休日の主な観察ポイント\n\n- 0:00～0:05：半蔵門線と大江戸線の一部方向で終電\n- 0:17ごろ：半蔵門線と大江戸線の清澄白河止まりが近接\n- 0:29～0:31ごろ：大江戸線の両方向から当駅止まり\n- 0:41～0:43ごろ：大江戸線の両方向から当駅止まり\n- 0:54ごろ：最後の清澄白河止まり\n\n## 7. 駅・路線の概要\n\n清澄白河駅には、東京メトロ半蔵門線と都営大江戸線の2路線が乗り入れている。\n\n| 路線・方向 | 主な行き先 | 次の駅 |\n|---|---|---|\n| 半蔵門線・渋谷方面 | 大手町、九段下、渋谷、東急田園都市線方面 | 水天宮前駅 |\n| 半蔵門線・押上方面 | 住吉、錦糸町、押上、東武線方面 | 住吉駅 |\n| 大江戸線・両国方面 | 両国、上野御徒町、春日方面 | 森下駅 |\n| 大江戸線・大門方面 | 門前仲町、汐留、大門、六本木方面 | 門前仲町駅 |\n\n## 8. 現地調査時の確認項目\n\n- 半蔵門線と大江戸線で、利用する改札・出口が異なるか\n- 清澄白河止まり到着後、改札から出てくる人数\n- 改札外へ出る人と、駅構内で別路線へ乗り換える人の割合\n- 0:30前後、0:40台、0:54ごろの人の集中\n- タクシー、送迎車、徒歩、自転車などへの移動\n- 駅前で待機する人、電話をする人、経路を検索する人\n- 平日と土曜休日の半蔵門線終電時刻差による人流の違い\n- 列車の遅延、運休、臨時列車の有無\n\n## 9. 注意事項\n\n- 本資料は2026年6月11日に閲覧した東京メトロおよび東京都交通局の公式情報を基にしている。\n- 都営大江戸線の公式時刻表には「令和7年3月15日改正」と表示されている。\n- 大江戸線の到着見込みは隣駅の公式発車時刻から算出した推定値である。\n- 半蔵門線土曜休日の到着見込みは隣駅の公式発車時刻から算出した推定値である。\n- 臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。\n- 調査当日に各社公式サイト、駅掲示、発車案内で再確認する。\n\n## 10. 出典\n\n- 東京メトロ「清澄白河駅 時刻表」  \n  https://www.tokyometro.jp/station/kiyosumi-shirakawa/timetable/index.html\n- 東京メトロ「水天宮前駅 時刻表」  \n  https://www.tokyometro.jp/station/suitengumae/timetable/index.html\n- 東京メトロ「住吉駅 時刻表」  \n  https://www.tokyometro.jp/station/sumiyoshi/timetable/index.html\n- 東京都交通局「清澄白河 平日：大門・六本木方面」  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E14BD.html\n- 東京都交通局「清澄白河 平日：両国・春日方面」  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E14AD.html\n- 東京都交通局「清澄白河 土曜・休日：大門・六本木方面」  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E14BH.html\n- 東京都交通局「清澄白河 土曜・休日：両国・春日方面」  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E14AH.html\n- 東京都交通局「門前仲町 大江戸線時刻表」  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E15AD.html  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E15AH.html\n- 東京都交通局「森下 大江戸線時刻表」  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E13BD.html  \n  https://www.kotsu.metro.tokyo.jp/subway/timetable/oedo/E13BH.html\n","経堂駅終電調査レポート_20260611.md":"# 経堂駅 終電調査レポート\n\n調査日：2026年6月11日  \n対象駅：小田急小田原線 経堂駅（OH11）  \n時刻表：小田急電鉄公式サイトで2026年6月11日に表示された時刻表\n\n## 1. 調査目的\n\n経堂駅で終電を逃した利用客や、経堂止まりの列車から降りる利用客が駅外へ出てくる時間帯を把握するため、最終列車と当駅止まり列車を整理する。\n\n## 2. 調査時間帯の目安\n\n### 平日・土曜休日共通\n\n- 調査推奨時間：0:15～1:10ごろ\n- 特に注目する時間：0:30～1:05ごろ\n- 最後の経堂止まり到着：1:00\n- 降車後の移動や待ち合わせを考慮すると、1:05～1:10ごろまで駅から人が出てくる可能性がある。\n\n## 3. 経堂駅から出発する最終列車\n\n平日・土曜休日とも、公式時刻表上の最終出発時刻は同じ。\n\n| 方向 | 最終出発 | 行き先 | 種別 |\n|---|---:|---|---|\n| 上り | 0:31 | 新宿 | 各駅停車 |\n| 下り | 0:44 | 向ヶ丘遊園 | 各駅停車 |\n| 下り | 0:44 | 成城学園前 | 急行 |\n\n### 終電を逃す可能性が高まる時間\n\n- 新宿方面は0:31発以降、営業列車がない。\n- 成城学園前・向ヶ丘遊園方面は0:44発以降、営業列車がない。\n- 0:54と1:00に到着する経堂止まりの利用客は、経堂駅から先へ小田急線で移動できない。\n\n## 4. 経堂止まりの到着列車\n\n深夜の経堂止まりは、千歳船橋側と豪徳寺側の両方向から設定されている。\n\n平日・土曜休日とも時刻は同じ。到着時刻は、小田急電鉄公式時刻表の列車別停車駅表示で確認した。\n\n| 到着方向 | 隣駅発 | 経堂到着 | 種別 |\n|---|---:|---:|---|\n| 千歳船橋側（小田原側） | 千歳船橋 0:53発 | 0:54 | 各駅停車・経堂行 |\n| 豪徳寺側（新宿側） | 豪徳寺 0:58発 | 1:00 | 各駅停車・経堂行 |\n\n## 5. 乗客が出てくると予想される時間\n\n### 主な観察ポイント\n\n| 時刻 | 状況 | 想定 |\n|---:|---|---|\n| 0:31 | 上り最終が出発 | 以降は新宿方面へ乗車できない |\n| 0:44 | 下り最終2本が出発 | 以降は小田原方面へ乗車できない |\n| 0:54 | 千歳船橋側から経堂止まり到着 | 西側から来た降車客が駅外へ移動 |\n| 1:00 | 豪徳寺側から最後の経堂止まり到着 | 新宿側から来た降車客が駅外へ移動 |\n| 1:00～1:10ごろ | 全列車終了後 | タクシー、送迎、徒歩などへ移る人に注目 |\n\n経堂駅では、上下方向の終電出発後に両方向から経堂止まりが到着する。特に0:50以降が、終電後の利用客を観察する中心時間帯になる。\n\n## 6. 駅・路線の概要\n\n経堂駅には小田急小田原線が乗り入れている。公式駅ページでは、急行、準急、通勤準急、各駅停車の停車駅とされている。\n\n| 方向 | 主な行き先 | 次の駅 |\n|---|---|---|\n| 上り | 新宿、代々木上原、東京メトロ千代田線方面 | 豪徳寺駅 |\n| 下り | 成城学園前、登戸、新百合ヶ丘、町田、小田原、唐木田方面 | 千歳船橋駅 |\n\n駅にはバス停、タクシー乗り場があり、終電後の移動手段を観察しやすい。\n\n## 7. 現地調査時の確認項目\n\n- 0:54および1:00の経堂止まり到着後、改札から出てくる人数\n- 千歳船橋側と豪徳寺側から来る利用客数の違い\n- タクシー乗り場へ向かう人数と待機列\n- バス、送迎車、徒歩、自転車などへの移動\n- 駅前で待機する人、電話をする人、経路を検索する人\n- 経堂コルティ側と反対側への人の流れ\n- 列車の遅延、運休、臨時列車の有無\n\n## 8. 注意事項\n\n- 本資料は2026年6月11日に閲覧した小田急電鉄公式情報を基にしている。\n- 上りPDF時刻表には「2026年3月16日改正」と表示されている。\n- 小田急公式の動的時刻表には「2026年6月11日現在」と表示されている。\n- 臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。\n- 調査当日に小田急電鉄公式サイト、駅掲示、発車案内で再確認する。\n\n## 9. 出典\n\n- 小田急電鉄「経堂駅のご案内」  \n  https://www.odakyu.jp/station/kyodo/\n- 小田急電鉄「経堂駅 時刻表詳細（上り）」  \n  https://www.odakyu.jp/station/kyodo/timetable/up/\n- 小田急電鉄「経堂駅 時刻表詳細（下り）」  \n  https://www.odakyu.jp/station/kyodo/timetable/down/\n- 小田急電鉄「豪徳寺駅 時刻表詳細（下り）」  \n  https://www.odakyu.jp/station/gotokuji/timetable/down/\n- 小田急電鉄「千歳船橋駅 時刻表詳細（上り）」  \n  https://www.odakyu.jp/station/chitose_funabashi/timetable/up/\n"};

    const grid = document.querySelector("#grid");
    const search = document.querySelector("#search");
    const resultCount = document.querySelector("#resultCount");
    const lateSort = document.querySelector("#lateSort");
    const compact = document.querySelector("#compact");
    const modal = document.querySelector("#modal");
    const reportModal = document.querySelector("#reportModal");
    let sortLate = false;
    let compactMode = false;

    function cardTemplate(station) {
      return `
        <article class="card" data-name="${station.name} ${station.route}">
          <div class="card-top">
            <div><h2 class="station">${station.name}</h2><div class="date">調査日 ${station.date}</div></div>
            <span class="badge">調査済み</span>
          </div>
          <div class="route">${station.route}</div>
          <div class="time-grid">
            <div class="time-box"><span class="label">調査推奨</span><span class="value">${station.recommended}</span></div>
            <div class="time-box focus"><span class="label">特に注目</span><span class="value">${station.focus}</span></div>
            <div class="time-box wide last"><span><span class="label">最後の駅止まり到着</span><span class="value">${station.last}</span></span></div>
          </div>
          <div class="actions">
            <button class="details" type="button" data-open="${station.name}">見るべき時刻</button>
            <button class="report" type="button" data-report="${station.name}">全文</button>
          </div>
        </article>`;
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      let list = stations.filter(s => `${s.name} ${s.route}`.toLowerCase().includes(query));
      if (sortLate) list = [...list].sort((a, b) => b.sort - a.sort);
      grid.innerHTML = list.map(cardTemplate).join("") + `<div class="empty">該当する駅がありません</div>`;
      grid.querySelector(".empty").style.display = list.length ? "none" : "block";
      resultCount.textContent = list.length;
      document.body.classList.toggle("compact-mode", compactMode);
      grid.querySelectorAll("[data-open]").forEach(button => button.addEventListener("click", () => openDetails(button.dataset.open)));
      grid.querySelectorAll("[data-report]").forEach(button => button.addEventListener("click", () => openReport(button.dataset.report)));
    }

    function openDetails(name) {
      const s = stations.find(item => item.name === name);
      document.querySelector("#modalTitle").textContent = s.name;
      document.querySelector("#modalRoute").textContent = s.route;
      document.querySelector("#modalLead").textContent = s.lead;
      document.querySelector("#timeline").innerHTML = s.events.map(event =>
        `<div class="event"><div class="event-time">${event[0]}</div><div class="event-text">${event[1]}</div></div>`
      ).join("");
      modal.showModal();
    }

    function openReport(name) {
      const station = stations.find(item => item.name === name);
      document.querySelector("#reportTitle").textContent = station.name;
      document.querySelector("#reportContent").textContent = reports[station.file] || "レポートを読み込めませんでした。";
      reportModal.showModal();
    }

    search.addEventListener("input", render);
    lateSort.addEventListener("click", () => {
      sortLate = !sortLate;
      lateSort.setAttribute("aria-pressed", String(sortLate));
      render();
    });
    compact.addEventListener("click", () => {
      compactMode = !compactMode;
      compact.setAttribute("aria-pressed", String(compactMode));
      render();
    });
    document.querySelector("#closeModal").addEventListener("click", () => modal.close());
    document.querySelector("#closeReport").addEventListener("click", () => reportModal.close());
    modal.addEventListener("click", event => {
      if (event.target === modal) modal.close();
    });
    reportModal.addEventListener("click", event => {
      if (event.target === reportModal) reportModal.close();
    });
    render();
  </script>
</body>
</html>
