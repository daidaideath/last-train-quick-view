<th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>日比谷線北行<\/td><td>竹ノ塚まで<\/td><td>0:19<\/td><td>北千住から東武線へ直通する区間列車<\/td><\/tr><\/tbody><\/table><\/div><p>つくばエクスプレスは公式曜日別時刻表で確認した。秋葉原発つくば方面の最終は、<span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも0:07普通守谷行である。<\/p><h3>つくばエクスプレス<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>対象<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>秋葉原発・つくば方面最終<\/td><td>0:07 普通守谷行<\/td><td>0:07 普通守谷行<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅に着く最終列車", "pages": ["<p>今回確認したデータは秋葉原駅の発車時刻表であり、秋葉原駅へ到着して運転を終える列車の到着時刻は確定していない。<\/p><ul><li>上記の品川行、池袋行、蒲田行、上野行などは、秋葉原駅を出る列車の行き先であり、秋葉原駅の終着列車ではない。<\/li><li>JR・日比谷線に秋葉原終着として扱う深夜定期列車は本調査の主対象にない。<\/li><li>TXは新御徒町0:10発の秋葉原行が<span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>とも最後で、秋葉原0:12頃着の見込み。<\/li><\/ul><h3>つくばエクスプレス終着<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>対象<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>新御徒町発・秋葉原行最終<\/td><td>0:10<\/td><td>0:10<\/td><\/tr><tr><td>秋葉原終着到着見込み<\/td><td>0:12頃<\/td><td>0:12頃<\/td><\/tr><\/tbody><\/table><\/div><p>TX公式時刻表は2025年3月15日改正表示。到着は隣駅発時刻からの見込みである。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:55～1:00ごろ<\/li><li>特に注目する時間：0:19～0:50ごろ<\/li><li>今回確認した最も遅い発車：0:47 京浜東北線北行・上野行<\/li><li>0:28は中央・総武線東行と京浜東北線南行が同時刻で、乗り換え失敗後の動きが出やすい。<\/li><li>0:42～0:47にJR各線の最終が集中するため、電気街口・中央改札・昭和通り口の流出差を見る。<\/li><li>JRと日比谷線、つくばエクスプレスは改札位置が離れており、時刻上は間に合っても実際の乗り換えが難しい場合がある。<\/li><\/ul><h3>現地で確認したいこと<\/h3>", "<p>秋葉原駅で終電を逃した利用客と、途中駅止まりの最終列車しか残っていない利用客が、どの改札・出口から駅外へ出て、タクシー、徒歩、宿泊施設などへ移るかを把握する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>電気街口、中央改札、昭和通り口ごとの流出量<\/li><li>JRから日比谷線・つくばエクスプレスへ乗り継げなかった人<\/li><li>日比谷線・つくばエクスプレスからJRへ乗り継げなかった人<\/li><li>0:28の中央・総武線東行、京浜東北線南行発車後の人流<\/li><li>0:42～0:47のJR最終集中帯の人流<\/li><li>タクシー乗り場、繁華街、ホテル方面へ向かう人<\/li><\/ul><ul><li>駅前で電話、経路検索、宿泊先検索をする人<\/li><li><span class=\"day weekday\">平日<\/span>と<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>の違い<\/li><li>遅延、運休、臨時列車、運転日注意の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：JR東日本・東京メトロ・首都圏新都市鉄道 秋葉原駅<\/li><li>JR時刻表：JR東日本公式時刻表の2026年6月号表示を確認<\/li><li>日比谷線時刻表：東京メトロ公式PDF（2026年3月改正）を確認<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>JR東日本「秋葉原駅 時刻表」<\/li><\/ul><p><a href=\"https://timetables.jreast.co.jp/timetable/list0041.html\" target=\"_blank\" rel=\"noreferrer\">https://timetables.jreast.co.jp/timetable/list0041.html<\/a><\/p><ul><li>JR東日本「秋葉原駅 中央・総武線各駅停車、山手線、京浜東北線・根岸線 時刻表」<\/li><\/ul><p>各方向のURLは <code>公式時刻表調査データ_20260619_v2.json<\/code> に保存<\/p><ul><li>東京メトロ「秋葉原駅 時刻表」<\/li><\/ul>", "<p><a href=\"https://www.tokyometro.jp/station/akihabara/timetable/index.html\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/akihabara/timetable/index.html<\/a><\/p><ul><li>東京メトロ「日比谷線 秋葉原駅 印刷用時刻表」<\/li><\/ul><p><a href=\"https://www.tokyometro.jp/station/timetable/pdf/202603/H16.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyometro.jp/station/timetable/pdf/202603/H16.pdf<\/a><\/p>"]}]}, {"name": "羽田空港駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>羽田空港の鉄道アクセスは、京急空港線の羽田空港第1・第2ターミナル駅と、東京モノレールの羽田空港第2ターミナル駅を分けて扱う。深夜帯は空港到着から改札到達までの時間差があるため、列車時刻だけでなくターミナル内動線も重要である。<\/p><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>京急空港線<\/td><td>京急蒲田、品川、泉岳寺、都営浅草線方面<\/td><td>羽田空港第3ターミナル<\/td><\/tr><tr><td>東京モノレール<\/td><td>羽田空港第3ターミナル、天王洲アイル、浜松町方面<\/td><td>羽田空港第1ターミナル<\/td><\/tr><tr><td>空港内動線<\/td><td>第1・第2ターミナル、バス、タクシー、ホテル方面<\/td><td>-<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>京急空港線・京急蒲田方面<\/td><td>0:11<\/td><td>京急蒲田<\/td><td>京急公式駅掲示時刻表PDF・<span class=\"day weekday\">平日<\/span><\/td><\/tr><tr><td>東京モノレール・浜松町方面<\/td><td>0:05<\/td><td>モノレール浜松町<\/td><td>東京モノレール公式曜日別時刻表で確認<\/td><\/tr><\/tbody><\/table><\/div><h3>行き先別の実質最終<\/h3><p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>京急<\/td><td>京急蒲田まで<\/td><td>0:11<\/td><td><span class=\"day weekday\">平日<\/span>の路線最終。<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>は0:05品川行<\/td><\/tr><tr><td>東京モノレール<\/td><td>浜松町まで<\/td><td>0:05<\/td><td><span class=\"day mixed\"><span class=\"weekday\"><span class=\"day weekday\">平日<\/span><\/span>・<span class=\"holiday\"><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span><\/span><\/span>共通<\/td><\/tr><tr><td>空港内<\/td><td>鉄道終了後<\/td><td>0:10以降<\/td><td>タクシー、バス、ホテル、空港内待機へ分かれる<\/td><\/tr><\/tbody><\/table><\/div><h3>曜日別の確認<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>事業者・方向<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>京急・品川方面の最終<\/td><td>0:11 普通京急蒲田行<\/td><td>0:05 普通品川行<\/td><\/tr><tr><td>東京モノレール・浜松町方面の最終<\/td><td>0:05 モノレール浜松町行<\/td><td>0:05 モノレール浜松町行<\/td><\/tr><\/tbody><\/table><\/div><p>京急は羽田空港第1・第2ターミナル駅公式PDF（<span class=\"day weekday\">平日<\/span>2025年12月15日改正、<span class=\"day holiday\">土<span class=\"day holiday\">休日<\/span><\/span>2025年12月13日改正）を画像で確認した。東京モノレールは公式サイトから案内される曜日別時刻表で確認した。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>羽田空港側は鉄道の終着駅として到着客が発生する一方、終電調査では空港到着便から鉄道に乗れるかが主眼となる。第1・第2ターミナルの移動、手荷物受取、改札到達までの時間を含めて観察する。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:20～0:45ごろ<\/li><li>特に注目する時間：23:45～0:20ごろ<\/li><li>京急は羽田空港第1・第2ターミナル駅、モノレールは羽田空港第2ターミナル駅として扱う。<\/li><li>0:05前後にモノレール、0:11前後に京急の終盤が重なる。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>羽田空港駅（京急・東京モノレール合体版）で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>京急と東京モノレールの選択差<\/li><li>第1・第2ターミナル間の移動ロス<\/li><li>手荷物受取後に鉄道へ間に合うか<\/li><li>終電後のタクシー乗り場、バス、ホテル方面の流れ<\/li><li>空港内で待機する人、経路検索する人<\/li><li>航空便遅延、鉄道遅延、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：京浜急行電鉄・東京モノレール 羽田空港エリア<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>京急公式駅掲示時刻表PDFと東京モノレール公式ページから案内される時刻表を基に整理した。<\/li><li>羽田空港は駅名とターミナル名が事業者で異なるため、調査メモでは必ず事業者名を併記する。<\/li><li>航空便の到着遅れ、手荷物受取、ターミナル移動により、列車時刻前でも乗車できない場合がある。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>京急電鉄「羽田空港第1・第2ターミナル駅」<\/li><\/ul><p><a href=\"https://www.keikyu.co.jp/ride/kakueki/KK17.html\" target=\"_blank\" rel=\"noreferrer\">https://www.keikyu.co.jp/ride/kakueki/KK17.html<\/a><\/p><ul><li>京急電鉄「羽田空港第1・第2ターミナル駅 標準時刻表PDF」<\/li><\/ul><p><a href=\"https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK17.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK17.pdf<\/a><\/p><ul><li>東京モノレール「羽田空港第2ターミナル駅」<\/li><\/ul>", "<p><a href=\"https://www.tokyo-monorail.co.jp/guidance/haneda2/\" target=\"_blank\" rel=\"noreferrer\">https://www.tokyo-monorail.co.jp/guidance/haneda2/<\/a><\/p><ul><li>東京モノレール公式リンク先時刻表<\/li><\/ul><p><a href=\"https://train-cloud.navitime.biz/tokyo-monorail/railroads/timetables?station=00009397&amp;directional-railroad=00000783-up\" target=\"_blank\" rel=\"noreferrer\">https://train-cloud.navitime.biz/tokyo-monorail/railroads/timetables?station=00009397&amp;directional-railroad=00000783-up<\/a><\/p>"]}]}, {"name": "京急蒲田駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>京急蒲田駅には、京急本線と京急空港線が乗り入れる。品川・泉岳寺方面、横浜・三浦海岸方面、羽田空港方面が分岐するため、深夜帯は方向別に最終列車を整理する必要がある。<\/p><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>京急本線・上り<\/td><td>品川、泉岳寺、都営浅草線方面<\/td><td>梅屋敷<\/td><\/tr><tr><td>京急本線・下り<\/td><td>京急川崎、横浜、横須賀中央、三浦海岸方面<\/td><td>雑色<\/td><\/tr><tr><td>京急空港線<\/td><td>糀谷、天空橋、羽田空港方面<\/td><td>糀谷<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>本線・品川/新橋方面<\/td><td>0:13<\/td><td>品川方面<\/td><td>普通・急行等<\/td><\/tr><tr><td>本線・横浜/三浦海岸方面<\/td><td>0:22<\/td><td>横浜方面区間行き<\/td><td>普通<\/td><\/tr><tr><td>空港線・羽田空港方面<\/td><td>0:15<\/td><td>羽田空港第1・第2ターミナル<\/td><td>普通<\/td><\/tr><\/tbody><\/table><\/div><h3>行き先別の実質最終<\/h3>", "<p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>本線上り<\/td><td>品川方面<\/td><td>0:13<\/td><td>都心方面へ戻る最後の確認点<\/td><\/tr><tr><td>本線下り<\/td><td>横浜方面<\/td><td>0:22<\/td><td>横浜方面へ残る区間行き<\/td><\/tr><tr><td>空港線<\/td><td>羽田空港方面<\/td><td>0:15<\/td><td>空港方面へ向かう最後の確認点<\/td><\/tr><\/tbody><\/table><\/div><h3>曜日別の確認<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>本線上り・品川方面<\/td><td>0:13<\/td><td>0:13<\/td><\/tr><tr><td>本線下り・横浜方面<\/td><td>0:22<\/td><td>0:22<\/td><\/tr><tr><td>空港線・羽田空港方面<\/td><td>0:15<\/td><td>23:55<\/td><\/tr><\/tbody><\/table><\/div><p>京急公式駅掲示時刻表PDFで確認。空港線だけ曜日差が大きい。<\/p>"]}, {"name": "駅に着く最終列車", "pages": ["<p>京急蒲田は本線と空港線の分岐駅であり、駅止まり列車だけでなく、空港線から本線へ、本線から空港線へ乗り換えられるかが重要である。JR蒲田とは別駅のため、終電後の徒歩移動も観察対象になる。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:40～0:55ごろ<\/li><li>特に注目する時間：0:00～0:30ごろ<\/li><li>本線上り0:13、空港線0:15、本線下り0:22が方向別の確認点になる。<\/li><li>JR蒲田と京急蒲田の徒歩移動は、終電後の行動として必ず見る。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>京急蒲田駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>本線と空港線の最終乗り換え状況<\/li><li>JR蒲田方面へ歩く人<\/li><li>羽田空港方面へ向かえない利用客<\/li><li>第一京浜側、駅前タクシー、バス停方面の流れ<\/li><li>駅前で経路検索、電話、宿泊先検索をする人<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：京浜急行電鉄 京急蒲田駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>京急公式駅掲示時刻表PDFで確認した。<\/li><li>京急蒲田は方向別に行ける範囲が大きく異なるため、発車時刻と行先をセットで記録する。<\/li><li>臨時ダイヤ、年末年始、工事、事故、天候などにより変更される場合がある。<\/li><li>調査当日に公式サイト、駅掲示、発車案内で再確認する。<\/li><\/ul>"]}, {"name": "ソース", "pages": ["<ul><li>京急電鉄「京急蒲田駅」<\/li><\/ul><p><a href=\"https://www.keikyu.co.jp/ride/kakueki/KK11.html\" target=\"_blank\" rel=\"noreferrer\">https://www.keikyu.co.jp/ride/kakueki/KK11.html<\/a><\/p><ul><li>京急電鉄「京急蒲田駅 標準時刻表PDF」<\/li><\/ul><p><a href=\"https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK11.pdf\" target=\"_blank\" rel=\"noreferrer\">https://www.keikyu.co.jp/ride/kakueki/pdf/timetable/KK11.pdf<\/a><\/p>"]}]}, {"name": "京成高砂駅", "sections": [{"name": "駅・路線の概要", "pages": ["<p>京成高砂駅には、京成本線、京成金町線、成田スカイアクセス線、北総線が乗り入れる。京成・北総方面の分岐駅であり、高砂止まり、金町線乗り換え、成田空港方面、押上・都営浅草線方面を分けて見る必要がある。<\/p>", "<div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>主な行き先<\/th><th>次の駅<\/th><\/tr><\/thead><tbody><tr><td>京成本線・上り<\/td><td>青砥、日暮里、京成上野方面<\/td><td>青砥<\/td><\/tr><tr><td>京成本線・下り<\/td><td>京成八幡、京成船橋、京成成田方面<\/td><td>京成小岩<\/td><\/tr><tr><td>京成金町線<\/td><td>柴又、京成金町方面<\/td><td>柴又<\/td><\/tr><tr><td>成田スカイアクセス線・北総線<\/td><td>東松戸、新鎌ヶ谷、印旛日本医大、成田空港方面<\/td><td>新柴又<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅を出る最終列車", "pages": ["<h3><span class=\"day weekday\">平日<\/span>の主な最終列車<\/h3><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th>駅発<\/th><th>行き先<\/th><th>種別・確認内容<\/th><\/tr><\/thead><tbody><tr><td>京成本線・京成上野／押上方面<\/td><td>0:11<\/td><td>浅草橋<\/td><td>普通・<span class=\"day weekday\">平日<\/span><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>共通<\/td><\/tr><tr><td>京成本線・京成津田沼／成田方面<\/td><td>0:13<\/td><td>京成津田沼<\/td><td>普通・<span class=\"day weekday\">平日<\/span><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>共通<\/td><\/tr><tr><td>金町線<\/td><td>0:04<\/td><td>京成金町<\/td><td>普通・京成高砂始発・<span class=\"day weekday\">平日<\/span><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>共通<\/td><\/tr><tr><td>北総線・成田スカイアクセス線<\/td><td>0:11<\/td><td>印旛日本医大<\/td><td>普通・<span class=\"day weekday\">平日<\/span><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span><span class=\"day holiday\">休日<\/span><\/span>共通<\/td><\/tr><\/tbody><\/table><\/div><h3>行き先別の実質最終<\/h3>", "<p>最終列車だけを見ると、途中駅止まりを最終として扱ってしまう場合がある。調査では、目的地へ届く最後の列車と、路線として最後に残る区間列車を分けて見る。<\/p><div class=\"table-wrap\"><table><thead><tr><th>方向<\/th><th>行ける範囲<\/th><th>駅発<\/th><th>見るポイント<\/th><\/tr><\/thead><tbody><tr><td>京成本線上り<\/td><td>浅草橋まで<\/td><td>0:11<\/td><td>路線最終<\/td><\/tr><tr><td>京成本線下り<\/td><td>京成津田沼まで<\/td><td>0:13<\/td><td>路線最終<\/td><\/tr><tr><td>金町線<\/td><td>京成金町まで<\/td><td>0:04<\/td><td>支線最終<\/td><\/tr><tr><td>北総線<\/td><td>印旛日本医大まで<\/td><td>0:11<\/td><td>北総方面の路線最終<\/td><\/tr><\/tbody><\/table><\/div>", "<h3>曜日別の確認<\/h3><p>京成高砂駅を出る4方向の最終列車は、<span class=\"day weekday\">平日<\/span>と<span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span>で同じ。<\/p><div class=\"table-wrap\"><table><thead><tr><th>路線・方向<\/th><th><span class=\"day weekday\">平日<\/span><\/th><th><span class=\"day holiday\"><span class=\"day holiday\">土曜<\/span>・<span class=\"day holiday\">休日<\/span><\/span><\/th><\/tr><\/thead><tbody><tr><td>京成本線・京成上野／押上方面<\/td><td>0:11 普通浅草橋行<\/td><td>0:11 普通浅草橋行<\/td><\/tr><tr><td>京成本線・京成津田沼／成田方面<\/td><td>0:13 普通京成津田沼行<\/td><td>0:13 普通京成津田沼行<\/td><\/tr><tr><td>京成金町線・京成金町方面<\/td><td>0:04 普通京成金町行<\/td><td>0:04 普通京成金町行<\/td><\/tr><tr><td>北総線・成田スカイアクセス線方面<\/td><td>0:11 普通印旛日本医大行<\/td><td>0:11 普通印旛日本医大行<\/td><\/tr><\/tbody><\/table><\/div>"]}, {"name": "駅に着く最終列車", "pages": ["<p>京成高砂は車庫・分岐駅としての性格が強く、高砂止まりや高砂始発が調査上重要である。終電調査では、高砂止まりから降りる人、金町線や北総線へ乗り換えられない人、押上線方面へ向かえない人を分けて観察する。<\/p><h3>京成高砂止まり<\/h3>", "<div class=\"table-wrap\"><table><thead><tr><th>確認駅<\/th><th>最終の京成高砂行<\/th><th>京成高砂到着<\/th><\/tr><\/thead><tbody><tr><td>青砥<\/td><td>0:39発<\/td><td>0:41頃<\/td><\/tr><tr><td>京成小岩<\/td><td>0:08発<\/td><td>0:11頃<\/td><\/tr><tr><td>柴又<\/td><td>0:15発<\/td><td>0:17頃<\/td><\/tr><tr><td>新柴又<\/td><td>該当なし<\/td><td>-<\/td><\/tr><\/tbody><\/table><\/div><p>新柴又方面の最終は23:50普通泉岳寺行で、京成高砂を通過して継続運転する。到着の「頃」は隣駅発時刻からの見込み。<\/p>"]}, {"name": "見るべきポイント", "pages": ["<ul><li>調査推奨時間：23:40～0:55ごろ<\/li><li>特に注目する時間：0:00～0:40ごろ<\/li><li>京成本線、金町線、北総線、成田スカイアクセス線で終電時刻と行先が分かれる。<\/li><li>高砂止まりの降車客と、乗り換え失敗客を分けて見る。<\/li><\/ul><h3>現地で確認したいこと<\/h3><p>京成高砂駅で終電を逃した利用客と、途中駅止まり・駅止まり列車から降りる利用客が駅外へ出てくる時間帯を把握するため、路線ごとの最終列車と目的地別の実質最終を整理する。<\/p>"]}, {"name": "現地チェックリスト", "pages": ["<ul><li>金町線乗り換え失敗<\/li><li>京成本線と北総線・成田スカイアクセス線の分岐<\/li><li>高砂止まりの降車客<\/li><li>柴又方面、高砂橋方面、タクシー乗り場への流れ<\/li><li>駅前で経路検索、電話、迎車待ちをする人<\/li><li>列車の遅延、運休、臨時列車の有無<\/li><\/ul>"]}, {"name": "注意事項", "pages": ["<h3>基礎情報<\/h3><ul><li>対象駅：京成電鉄・北総鉄道 京成高砂駅<\/li><li>時刻表：各鉄道事業者の公式サイト、または公式サイトから案内される時刻表で確認<\/li><\/ul><ul><li>京成公式駅ページと、公式ページから案内される駅別時 function showStation(index,{push=false,section=0,fromList=false}={}){stationIndex=index;renderDetail(index);stationView.hidden=true;detailView.hidden=false;if(push)history.pushState({view:'detail',station:index,section,fromList},'',detailHash(index,section));const move=()=>requestAnimationFrame(()=>window.scrollTo({top:0}));if(document.readyState==='complete')move();else window.addEventListener('load',move,{once:true})}
function showStationList({replaceUrl=false}={}){detailView.hidden=true;stationView.hidden=false;document.getElementById('currentTop').textContent='駅を選択';document.title='LAST TRAIN / 22 STATIONS';if(replaceUrl)history.replaceState({view:'list'},'',location.pathname+location.search);requestAnimationFrame(()=>window.scrollTo({top:0}))}
function openFromLocation(){const params=new URLSearchParams(location.hash.slice(1));const rawIndex=params.get('station');const index=rawIndex===null?NaN:Number(rawIndex);const section=Number(params.get('section')||0);if(Number.isInteger(index)&&stations[index]){const safeSection=Number.isInteger(section)&&section>=0&&section<sectionNames.length?section:0;history.replaceState({view:'detail',station:index,section:safeSection,fromList:false},'',detailHash(index,safeSection));showStation(index,{section:safeSection})}else{history.replaceState({view:'list'},'',location.pathname+location.search);showStationList()}}
stationNav.addEventListener('click',e=>{const button=e.target.closest('[data-station]');if(!button)return;showStation(Number(button.dataset.station),{push:true,section:0,fromList:true})});
sectionNav.addEventListener('click',e=>{const link=e.target.closest('[data-section]');if(!link)return;e.preventDefault();const section=Number(link.dataset.section);history.replaceState({...history.state,section},'',detailHash(stationIndex,section));document.getElementById(`section-${section}`).scrollIntoView({behavior:'smooth',block:'start'})});
function backToStations(){if(history.state?.fromList)history.back();else showStationList({replaceUrl:true})}
document.getElementById('backToStations').addEventListener('click',backToStations);document.getElementById('backToStationsBottom').addEventListener('click',backToStations);search.addEventListener('input',()=>renderStationNav(search.value));window.addEventListener('popstate',e=>{if(e.state?.view==='detail'&&stations[e.state.station])showStation(e.state.station,{section:e.state.section||0});else showStationList()});renderStationNav();openFromLocation();
</script></body></html>
