<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>駅別 終電クイックビュー</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0e1b2d;
      --panel-2: #13243a;
      --line: rgba(255,255,255,.09);
      --text: #f4f7fb;
      --muted: #9eacbf;
      --cyan: #55d8d0;
      --amber: #ffca69;
      --pink: #ff829c;
      --shadow: 0 18px 55px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 15% -10%, rgba(38,134,169,.28), transparent 30rem),
        radial-gradient(circle at 90% 10%, rgba(86,64,164,.2), transparent 28rem),
        var(--bg);
      font-family: "Segoe UI", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
    }
    button, input, select { font: inherit; }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    header { padding: 42px 0 22px; }
    .eyebrow {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 14px var(--cyan); }
    h1 { margin: 12px 0 6px; font-size: clamp(30px, 5vw, 54px); line-height: 1.08; letter-spacing: -.04em; }
    .lead { margin: 0; max-width: 720px; color: var(--muted); font-size: 15px; line-height: 1.8; }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 0;
      background: rgba(7,17,31,.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }
    .tools { display: grid; grid-template-columns: minmax(220px, 1fr) auto auto; gap: 10px; }
    .field {
      display: flex;
      align-items: center;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.055);
    }
    .field:focus-within { border-color: rgba(85,216,208,.65); box-shadow: 0 0 0 3px rgba(85,216,208,.1); }
    .field input { width: 100%; color: var(--text); border: 0; outline: 0; background: transparent; }
    .field input::placeholder { color: #748399; }
    .tool-button {
      min-height: 46px;
      padding: 0 16px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.055);
      cursor: pointer;
    }
    .tool-button[aria-pressed="true"] { color: #041313; border-color: var(--cyan); background: var(--cyan); font-weight: 800; }
    main { padding: 25px 0 70px; }
    .summary { display: flex; justify-content: space-between; align-items: end; gap: 14px; margin-bottom: 16px; }
    .count { font-size: 14px; color: var(--muted); }
    .count strong { color: var(--text); font-size: 25px; }
    .notice { color: var(--amber); font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 15px; }
    .card {
      position: relative;
      overflow: hidden;
      min-height: 298px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(19,36,58,.95), rgba(11,25,42,.96));
      box-shadow: var(--shadow);
      transition: transform .2s ease, border-color .2s ease;
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(85,216,208,.35); }
    .card::after {
      content: "";
      position: absolute;
      top: -80px;
      right: -80px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent, rgba(85,216,208,.16)), transparent 65%);
      pointer-events: none;
    }
    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .station { margin: 0; font-size: 27px; letter-spacing: -.03em; }
    .date { margin-top: 5px; color: var(--muted); font-size: 11px; }
    .badge { flex: 0 0 auto; padding: 6px 9px; border-radius: 999px; color: var(--cyan); background: rgba(85,216,208,.1); font-size: 10px; font-weight: 800; }
    .route { min-height: 36px; margin: 14px 0 16px; color: #c1ccda; font-size: 12px; line-height: 1.55; }
    .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .time-box { padding: 12px; border: 1px solid var(--line); border-radius: 13px; background: rgba(0,0,0,.12); }
    .time-box.wide { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .04em; }
    .value { font-size: 16px; font-weight: 800; }
    .focus .value { color: var(--amber); }
    .last .value { color: var(--pink); }
    .actions { display: flex; gap: 8px; margin-top: 15px; }
    .compact-mode .card { min-height: 0; }
    .compact-mode .card .route,
    .compact-mode .card .time-box:not(.focus):not(.last),
    .compact-mode .card .report { display: none; }
    .details, .report {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 13px;
      border-radius: 11px;
      text-decoration: none;
      cursor: pointer;
    }
    .details { flex: 1; color: #061719; border: 0; background: var(--cyan); font-weight: 800; }
    .report { color: var(--text); border: 1px solid var(--line); background: transparent; }
    .empty { display: none; grid-column: 1/-1; padding: 55px 20px; color: var(--muted); text-align: center; }
    dialog {
      width: min(680px, calc(100% - 28px));
      padding: 0;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #0d1b2c;
      box-shadow: 0 30px 100px rgba(0,0,0,.65);
    }
    dialog::backdrop { background: rgba(0,8,18,.76); backdrop-filter: blur(5px); }
    .modal-head { display: flex; justify-content: space-between; gap: 16px; padding: 22px 22px 16px; border-bottom: 1px solid var(--line); }
    .modal-head h2 { margin: 0; font-size: 27px; }
    .close { width: 38px; height: 38px; color: var(--text); border: 1px solid var(--line); border-radius: 50%; background: rgba(255,255,255,.05); cursor: pointer; }
    .modal-body { padding: 20px 22px 24px; }
    .modal-lead { margin: 0 0 18px; color: var(--muted); line-height: 1.75; }
    .timeline { display: grid; gap: 8px; }
    .event { display: grid; grid-template-columns: 105px 1fr; gap: 13px; padding: 12px 13px; border: 1px solid var(--line); border-radius: 13px; background: rgba(255,255,255,.035); }
    .event-time { color: var(--amber); font-weight: 800; }
    .event-text { color: #d3dce8; line-height: 1.55; }
    footer { padding: 24px 0 38px; color: #76869b; border-top: 1px solid var(--line); font-size: 11px; line-height: 1.7; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 620px) {
      .wrap { width: min(100% - 22px, 1180px); }
      header { padding-top: 28px; }
      .tools { grid-template-columns: 1fr 1fr; }
      .field { grid-column: 1 / -1; }
      .tool-button { padding: 0 9px; font-size: 12px; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 0; }
      .summary { align-items: center; }
      .notice { max-width: 170px; text-align: right; }
      .event { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="eyebrow"><span class="pulse"></span> LAST TRAIN FIELD GUIDE</div>
      <h1>駅別 終電クイックビュー</h1>
      <p class="lead">現場で迷わないための、終電調査サマリー。駅名を検索して、見るべき時間帯と最後の到着をすぐ確認できます。</p>
    </div>
  </header>

  <div class="toolbar">
    <div class="wrap tools">
      <label class="field"><input id="search" type="search" placeholder="駅名・路線名で検索" autocomplete="off"></label>
      <button class="tool-button" id="lateSort" type="button" aria-pressed="false">遅い順</button>
      <button class="tool-button" id="compact" type="button" aria-pressed="false">簡潔表示</button>
    </div>
  </div>

  <main class="wrap">
    <div class="summary">
      <div class="count"><strong id="resultCount">9</strong> 駅を表示</div>
      <div class="notice">当日は必ず公式案内で再確認</div>
    </div>
    <section class="grid" id="grid" aria-live="polite"></section>
  </main>

  <dialog id="modal">
    <div class="modal-head">
      <div><h2 id="modalTitle"></h2><div class="date" id="modalRoute"></div></div>
      <button class="close" id="closeModal" type="button" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body">
      <p class="modal-lead" id="modalLead"></p>
      <div class="timeline" id="timeline"></div>
    </div>
  </dialog>

  <footer>
    <div class="wrap">2026年6月11日・12日に作成した各駅の調査レポート全文に近い情報量の詳細画像版ページです。推定到着時刻を含みます。遅延、臨時ダイヤ、年末年始、工事などにより変更される場合があります。</div>
  </footer>

  <script>
    const stations = [
      {
        name: "経堂駅", route: "小田急小田原線（OH11）", date: "2026年6月11日",
        recommended: "0:15～1:10ごろ", focus: "0:30～1:05ごろ", last: "1:00",
        sort: 60, file: "visuals_detailed/kyodo_visual_detail_20260618.png",
        lead: "上下方向の終電出発後に、両方向から経堂止まりが到着。0:50以降が中心です。",
        events: [["0:31", "新宿方面の上り最終が出発"], ["0:44", "下り最終2本が出発"], ["0:54", "千歳船橋側から経堂止まり到着"], ["1:00", "豪徳寺側から最後の経堂止まり到着"], ["1:00～1:10", "タクシー、送迎、徒歩へ移る人に注目"]]
      },
      {
        name: "桜上水駅", route: "京王線（KO08）", date: "2026年6月11日",
        recommended: "平日 23:45～1:05ごろ", focus: "0:20～1:00ごろ", last: "0:54ごろ",
        sort: 54, file: "visuals_detailed/sakurajosui_visual_detail_20260618.png",
        lead: "新宿側と八王子側の両方向から桜上水止まりが到着。0:31の下り最終後に注目です。",
        events: [["0:16", "新宿方面の上り最終が出発"], ["0:25～0:26", "両方向から当駅止まりが近接して到着"], ["0:31", "八王子・橋本方面の下り最終が出発"], ["0:37～0:40", "両方向から当駅止まりが到着"], ["0:54", "新宿側から最後の桜上水止まり到着"]]
      },
      {
        name: "三鷹駅", route: "JR中央線快速・中央総武線", date: "2026年6月12日",
        recommended: "0:10～1:05ごろ", focus: "0:25～1:00ごろ", last: "0:57ごろ",
        sort: 57, file: "visuals_detailed/mitaka_visual_detail_20260618.png",
        lead: "中央線快速の最終後も、中央・総武線の三鷹止まりが続きます。",
        events: [["0:25～0:40", "三鷹止まり到着と各線最終が重なる"], ["0:40前後", "中央線快速下り最終後に注目"], ["0:51", "三鷹止まり到着"], ["0:57", "最後の三鷹止まり到着"], ["0:57～1:05", "北口・南口へ出る人流を確認"]]
      },
      {
        name: "上野駅", route: "JR東日本・東京メトロ", date: "2026年6月12日",
        recommended: "0:00～1:00ごろ", focus: "0:20～0:55ごろ", last: "0:47ごろ",
        sort: 47, file: "visuals_detailed/ueno_visual_detail_20260618.png",
        lead: "地下鉄・JRの最終が続き、最後は京浜東北線の上野止まりが中心になります。",
        events: [["23:38～0:01", "郊外方面、新幹線、地下鉄の最終が順次終了"], ["0:19～0:33", "地下鉄・京浜東北線・常磐線快速の最終が集中"], ["0:39～0:47", "山手線最終と上野止まりが重なる"], ["0:47", "最後の上野止まり到着見込み"], ["0:47～1:00", "各改札・出口方面への流出"]]
      },
      {
        name: "新橋駅", route: "JR・銀座線・浅草線・ゆりかもめ", date: "2026年6月12日",
        recommended: "23:55～1:00ごろ", focus: "0:10～0:55ごろ", last: "駅止まりなし",
        sort: 50, file: "visuals_detailed/shimbashi_visual_detail_20260618.png",
        lead: "深夜の新橋止まりはなく、地下鉄・ゆりかもめとJRの二つの終電ピークを見ます。",
        events: [["23:50～0:00", "ゆりかもめ豊洲行、JR郊外方面の最終が終了"], ["0:09～0:23", "浅草線・銀座線・ゆりかもめの最終が集中"], ["0:34～0:39", "山手線内回り・京浜東北線の最終"], ["0:50前後", "山手線外回り最終"], ["0:50～1:00", "タクシー・繁華街方面への移動"]]
      },
      {
        name: "清澄白河駅", route: "半蔵門線（Z11）・大江戸線（E14）", date: "2026年6月11日",
        recommended: "平日 0:10～1:05ごろ", focus: "0:25～1:00ごろ", last: "0:54ごろ",
        sort: 54, file: "visuals_detailed/kiyosumi-shirakawa_visual_detail_20260618.png",
        lead: "半蔵門線と大江戸線の終電・当駅止まりを横断して確認する駅です。",
        events: [["0:17ごろ", "半蔵門線の清澄白河止まり到着見込み"], ["0:25以降", "各方面の最終後の利用客に注目"], ["0:36", "半蔵門線の深夜帯到着"], ["0:54ごろ", "大江戸線の最後の清澄白河止まり"], ["0:54～1:05", "改札から地上へ出る人流を確認"]]
      },
      {
        name: "大崎駅", route: "JR東日本・りんかい線", date: "2026年6月11日",
        recommended: "0:15～1:05ごろ", focus: "0:20～1:00ごろ", last: "0:57ごろ",
        sort: 57, file: "visuals_detailed/osaki_visual_detail_20260618.png",
        lead: "山手線の各方向の最終後も、品川側と五反田側から大崎止まりが続きます。",
        events: [["0:20前後", "山手線各方向の最終が出発"], ["0:20～0:40", "両方向から大崎止まりが続く"], ["0:45前後", "終電後の降車客に注目"], ["0:57ごろ", "最後の大崎止まり到着見込み"], ["0:57～1:05", "改札・駅前への移動を確認"]]
      },
      {
        name: "池袋駅", route: "JR・東武・西武・東京メトロ", date: "2026年6月12日",
        recommended: "0:00～1:15ごろ", focus: "0:15～1:10ごろ", last: "1:02～1:03ごろ",
        sort: 63, file: "visuals_detailed/ikebukuro_visual_detail_20260618.png",
        lead: "私鉄・地下鉄・JRの最終後も、山手線池袋止まりが1時過ぎまで到着します。",
        events: [["0:11～0:22", "地下鉄・西武・丸ノ内線・JR北行の最終が集中"], ["0:21～0:31", "山手線両方向の最終"], ["0:30～0:50", "私鉄側の終電利用客と到着客に注目"], ["1:02～1:03", "最後の山手線池袋止まり到着見込み"], ["1:03～1:15", "大規模駅内の移動後、各出口へ出る人流"]]
      },
      {
        name: "品川駅", route: "JR東日本・JR東海・京急", date: "2026年6月11日",
        recommended: "0:10～1:10ごろ", focus: "0:15～1:05ごろ", last: "0:59ごろ",
        sort: 59, file: "visuals_detailed/shinagawa_visual_detail_20260618.png",
        lead: "京急の最終後もJRが続き、最後は山手線品川止まりの到着が中心です。",
        events: [["0:00～0:06", "京急線上下・東海道線下りの最終"], ["0:18ごろ", "京急線の最後の品川止まり"], ["0:20～0:30", "山手線・京浜東北線の主要方面最終"], ["0:49・0:54", "山手線品川止まり到着"], ["0:59ごろ", "最後の山手線品川止まり到着"]]
      }
    ];

    const grid = document.querySelector("#grid");
    const search = document.querySelector("#search");
    const resultCount = document.querySelector("#resultCount");
    const lateSort = document.querySelector("#lateSort");
    const compact = document.querySelector("#compact");
    const modal = document.querySelector("#modal");
    let sortLate = false;
    let compactMode = false;

    function cardTemplate(station) {
      return `
        <article class="card" data-name="${station.name} ${station.route}">
          <div class="card-top">
            <div><h2 class="station">${station.name}</h2><div class="date">調査日 ${station.date}</div></div>
            <span class="badge">調査済み</span>
          </div>
          <div class="route">${station.route}</div>
          <div class="time-grid">
            <div class="time-box"><span class="label">調査推奨</span><span class="value">${station.recommended}</span></div>
            <div class="time-box focus"><span class="label">特に注目</span><span class="value">${station.focus}</span></div>
            <div class="time-box wide last"><span><span class="label">最後の駅止まり到着</span><span class="value">${station.last}</span></span></div>
          </div>
          <div class="actions">
            <button class="details" type="button" data-open="${station.name}">見るべき時刻</button>
            <a class="report" href="${encodeURI(station.file)}" target="_blank" rel="noopener">詳細画像</a>
          </div>
        </article>`;
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      let list = stations.filter(s => `${s.name} ${s.route}`.toLowerCase().includes(query));
      if (sortLate) list = [...list].sort((a, b) => b.sort - a.sort);
      grid.innerHTML = list.map(cardTemplate).join("") + `<div class="empty">該当する駅がありません</div>`;
      grid.querySelector(".empty").style.display = list.length ? "none" : "block";
      resultCount.textContent = list.length;
      document.body.classList.toggle("compact-mode", compactMode);
      grid.querySelectorAll("[data-open]").forEach(button => button.addEventListener("click", () => openDetails(button.dataset.open)));
    }

    function openDetails(name) {
      const s = stations.find(item => item.name === name);
      document.querySelector("#modalTitle").textContent = s.name;
      document.querySelector("#modalRoute").textContent = s.route;
      document.querySelector("#modalLead").textContent = s.lead;
      document.querySelector("#timeline").innerHTML = s.events.map(event =>
        `<div class="event"><div class="event-time">${event[0]}</div><div class="event-text">${event[1]}</div></div>`
      ).join("");
      modal.showModal();
    }

    search.addEventListener("input", render);
    lateSort.addEventListener("click", () => {
      sortLate = !sortLate;
      lateSort.setAttribute("aria-pressed", String(sortLate));
      render();
    });
    compact.addEventListener("click", () => {
      compactMode = !compactMode;
      compact.setAttribute("aria-pressed", String(compactMode));
      render();
    });
    document.querySelector("#closeModal").addEventListener("click", () => modal.close());
    modal.addEventListener("click", event => {
      if (event.target === modal) modal.close();
    });
    render();
  </script>
</body>
</html>
